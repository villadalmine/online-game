[project]
name = "online-game"
version = "0.1.0"
description = "API-first, turn-based space strategy game with real planets and minerals"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "aiosqlite>=0.20",  # driver SQLite async: default de dev + lo usa el smoke --selftest (SDD 22)
    "alembic>=1.13",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "pyjwt>=2.8",
    "pyyaml>=6.0",
    "redis>=5.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "aiosqlite>=0.20",
    "fakeredis>=2.23",
    "ruff>=0.5",
]
ui = [
    "playwright>=1.44",
    "pytest-playwright>=0.5",
]

[project.scripts]
ogame-cli = "clients.cli.main:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
# Incluir TODOS los subpaquetes (app.api, app.services, …). Antes era packages=["app","clients"]
# (solo top-level) → `pip install .` dejaba un paquete incompleto (faltaba app.api). El runtime no
# lo notaba (corre desde el fuente), pero rompía a quien importara el paquete instalado (smoke).
include = ["app*", "clients*"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Autogenerated migration files — don't lint generated SQL ops.
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# B008: Depends() in argument defaults is the intended FastAPI idiom.
ignore = ["B008"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Browser (Playwright) tests live in tests/browser and run via `make test-ui`
# (they need a browser). Keep them out of the default fast suite.
addopts = "--ignore=tests/browser"
filterwarnings = [
    # Tests use a short dev JWT secret; not a concern for the suite.
    "ignore::UserWarning",
]
