image:
  # La CI publica una imagen multi-arch (amd64+arm64) en GHCR. Para un cluster local
  # (kind/minikube) podés override con --set image.repository=online-game image.tag=0.1.0
  repository: ghcr.io/villadalmine/online-game
  tag: "latest"
  pullPolicy: Always

# Si el paquete de GHCR es privado, creá un secret y referencialo:
#   kubectl create secret docker-registry ghcr --docker-server=ghcr.io \
#     --docker-username=USER --docker-password=GH_TOKEN
# imagePullSecrets: [ghcr]
imagePullSecrets: []

# Restringí los pods de la app a una arquitectura si la imagen no es multi-arch.
# Ej (cluster mixto / imagen arm64 de Kaniko): --set nodeSelector."kubernetes\.io/arch"=arm64
nodeSelector: {}

# Exponer vía Gateway API (ej. Cilium). Activá con --set gateway.enabled=true
gateway:
  enabled: false
  host: online-game.cluster.home
  name: cluster-gateway
  namespace: gateway

api:
  replicas: 2
  port: 8000

worker:
  # CronJob schedule for the periodic tick (build queues, mines, future combat/AI).
  schedule: "*/5 * * * *"

env:
  ENVIRONMENT: production
  JWT_SECRET: change-me
  REDIS_ENABLED: "true"
  AUTO_TICK_SECONDS: "0"        # 0 = usar el CronJob (multi-réplica); >0 corre tick in-process
  ENERGY_REGEN_PER_HOUR: "10"
  ENERGY_MAX: "240"
  ENERGY_START: "60"

# NPCs con IA. Para usar LLM: brain=llm y poné el token (no lo commitees: usá --set o
# un values-local.yaml gitignored). Si apiKey está vacío, NPC_BRAIN cae a reglas igual.
npc:
  brain: "rules"               # rules | llm
openrouter:
  apiKey: ""                   # ej: helm install ... --set openrouter.apiKey=sk-or-...
  baseUrl: "https://openrouter.ai/api/v1"
  model: "google/gemma-4-31b-it:free"

postgres:
  enabled: true
  user: game
  password: game
  db: game
  image: postgres:16-alpine

redis:
  enabled: true
  image: redis:7-alpine
