image:
  # La CI publica una imagen multi-arch (amd64+arm64) en GHCR. Para un cluster local
  # (kind/minikube) podés override con --set image.repository=online-game image.tag=0.1.0
  repository: ghcr.io/villadalmine/online-game
  tag: "latest"
  pullPolicy: Always

# Si el paquete de GHCR es privado, creá un secret y referencialo:
#   kubectl create secret docker-registry ghcr --docker-server=ghcr.io \
#     --docker-username=USER --docker-password=GH_TOKEN
# imagePullSecrets: [ghcr]
imagePullSecrets: []

# Restringí los pods de la app a una arquitectura si la imagen no es multi-arch.
# Ej (cluster mixto / imagen arm64 de Kaniko): --set nodeSelector."kubernetes\.io/arch"=arm64
nodeSelector: {}

# Exponer vía Gateway API (ej. Cilium). Activá con --set gateway.enabled=true
# El HTTPRoute se engancha al Gateway `name`/`namespace` y enruta por `host` (el DOMINIO va acá).
gateway:
  enabled: false                   # renderiza el HTTPRoute (templates/httproute.yaml)
  host: online-game.cluster.home   # el DOMINIO. ej: tu-dominio.example
  # Hostnames ADICIONALES en la MISMA HTTPRoute (un solo release/DB sirve varios dominios).
  # Ej para servir local + público a la vez: host=online-game.cluster.home y extraHosts:
  #   extraHosts: ["tu-dominio.example"]
  # OJO: cada host público necesita su listener HTTPS + cert en el Gateway (cert-manager).
  extraHosts: []
  name: cluster-gateway            # Gateway al que se engancha el HTTPRoute
  namespace: gateway

  # --- Gateway DEDICADO (aditivo) -------------------------------------------------------------
  # create=true → el chart CREA un Gateway propio (name/namespace) en vez de usar uno existente.
  # No toca `cluster-gateway` ni a los tenants. Para esto, poné name=public-gateway (o el que sea).
  create: false
  className: cilium
  lbip: ""                         # IP fija del pool Cilium (la que va en HAProxy). "" = el pool elige.
                                   #   ej: 192.0.2.50  (poné la IP de tu pool en tu values local)
  tls:
    enabled: false                 # true → listener HTTPS + Certificate (cert-manager)
    secretName: ""                 # "" = <release>-tls
    issuer: letsencrypt-staging    # ClusterIssuer: empezá con staging; flip a letsencrypt-prod

  # Asegurar el listener HTTPS en un Gateway EXISTENTE (create=false) de forma idempotente y
  # "todo por el chart": un hook Job (post-install/upgrade) que AGREGA el listener al Gateway
  # ajeno SOLO si no está (Helm no puede editar un objeto que no ownea). Requiere RBAC para
  # patchear el Gateway en su ns. Opt-in. Para Gateway dedicado (create=true) NO hace falta.
  ensureListener:
    enabled: false
    name: ""                       # nombre del listener; "" = <release>-https
    image: bitnami/kubectl:latest  # imagen con kubectl (mirror a tu registry si hace falta)

# --- ClusterIssuers Let's Encrypt (DNS-01 vía acme-dns) ---------------------------------------
# enabled=true → crea letsencrypt-staging + letsencrypt-prod. ADITIVO, no toca cert-manager.
# El secret de credenciales acme-dns se crea FUERA del chart (ver clusterissuer.yaml).
letsencrypt:
  enabled: false
  email: you@example.com           # tu email real va en values-local.yaml (gitignored), no acá
  acmeDnsHost: https://auth.acme-dns.io
  acmeDnsSecret: acme-dns-account  # secret en ns cert-manager, key credentials.json

api:
  replicas: 2
  port: 8000
  # Gate de rollout (SDD 22 capa 2): initContainer que corre el smoke (--selftest, SQLite efímero)
  # antes de servir; si falla, el pod no arranca y el rollout se frena. Opt-in.
  smokeInit:
    enabled: false
  # Resource requests/limits: SIN requests el HPA no puede escalar por CPU (SDD 7). Tunear
  # con un load test (tests/load/). requests = lo que reserva; limits = el techo por pod.
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# Autoscaling de la API (SDD 7). Opt-in: cuando enabled=true, el HPA maneja las réplicas
# (se ignora api.replicas). Necesita metrics-server y api.resources.requests.cpu.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 0   # 0 = sólo CPU

# No tirar todas las réplicas juntas en drains/upgrades (SDD 7).
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: 0

# Repartir las réplicas de la API entre nodos/zonas (SDD 7). Ej:
#   - maxSkew: 1
#     topologyKey: kubernetes.io/hostname
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector: { matchLabels: { app: RELEASE-api } }
topologySpreadConstraints: []

# Ajustes de capacidad de la app (SDD 7): SSE y pool de DB. Subir streamInterval baja la
# carga DB del SSE; dbPoolSize × maxReplicas ≤ max_connections de Postgres (techo real).
scaling:
  streamInterval: ""   # ej "5" (s). Vacío = default de la app (2 s)
  dbPoolSize: ""       # ej "5" por réplica
  dbMaxOverflow: ""    # ej "10"

worker:
  # CronJob schedule for the periodic tick (build queues, mines, future combat/AI).
  schedule: "*/5 * * * *"
  # El tick es O(N) (recorre todos los players); a escala, shardear por galaxia (SDD 8).
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

env:
  ENVIRONMENT: production
  JWT_SECRET: change-me
  REDIS_ENABLED: "true"
  AUTO_TICK_SECONDS: "0"        # 0 = usar el CronJob (multi-réplica); >0 corre tick in-process
  ENERGY_REGEN_PER_HOUR: "10"
  ENERGY_MAX: "240"
  ENERGY_START: "60"
  # Allowlist de altas (SDD 14): solo estos emails pueden registrarse (passwordless por código).
  # Vacío/ausente = registro abierto. Cambiar la lista = redeploy. Ej:
  # ALLOWED_EMAILS: "amigo1@gmail.com,amigo2@proton.me"

# NPCs con IA. Para usar LLM: brain=llm. El chart es agnóstico del proveedor: apuntá a
# CUALQUIER endpoint OpenAI-compatible (OpenRouter, LiteLLM, Ollama, vLLM) con llm.*.
# El chart NO levanta ningún LLM: vos corrés Ollama/LiteLLM donde quieras y le pasás la URL.
# Si llm.apiKey está vacío y no hay openrouter.apiKey, NPC_BRAIN cae a reglas igual.
npc:
  brain: "rules"               # rules | llm

# llm.* tiene prioridad; si lo dejás vacío, se usan los openrouter.* de abajo (compat).
llm:
  baseUrl: ""                  # ej http://litellm.litellm:4000/v1  ·  http://ollama.ollama:11434/v1
  model: ""                    # ej llama3.1:8b
  apiKey: ""                   # va a un Secret; para Ollama poné cualquier cosa (lo ignora)
  jsonMode: "true"             # response_format=json_object (apagá si tu server no lo soporta)
  # GPU local serial (SDD 9): el timeout corta la espera y dispara el fallback. Para una P4
  # con 7B podés necesitar subirlo; con 3-4B baja. El serving (Ollama/LiteLLM) corre FUERA
  # del chart — ver deploy/gpu-llm/. Vacío = default de la app (20 s).
  timeoutSeconds: ""           # ej "30"

# Envío de email (SDD 6/14): para que llegue el código OTP. backend console (default, solo loguea)
# | smtp | resend. Para Resend: poné resendApiKey (va a un Secret) y un from del dominio verificado.
# otpSecret fuerte en prod (HMAC del código OTP) — va a un Secret. Todo lo real en values-local.yaml.
mail:
  backend: ""                  # ej: resend
  from: ""                     # ej: "Online Galaxy War <no-reply@tu-dominio-verificado>"
  resendApiKey: ""             # va a un Secret (no al repo)
  otpSecret: ""                # va a un Secret (HMAC del OTP); fuerte en prod

# Observabilidad (SDD 19): /metrics (Prometheus) + ServiceMonitor para scrapearlo.
# token va a un Secret; con token, /metrics exige Bearer (no público). Prometheus lo manda por
# bearerTokenSecret. serviceMonitor.enabled requiere el Prometheus Operator (CRD ServiceMonitor).
metrics:
  token: ""                    # ej: un random; va a un Secret (no al repo)
  serviceMonitor:
    enabled: false
    interval: 30s
    # labels para que tu Prometheus lo seleccione (matchea spec.serviceMonitorSelector). Ej:
    #   release: kube-prometheus-stack
    labels: {}
  # Alertas (PrometheusRule): signup nuevo (→ Telegram vía tu Alertmanager), API caída, 5xx alto.
  # Reusa metrics.serviceMonitor.labels para que el ruleSelector las tome. Opt-in.
  prometheusRule:
    enabled: false
  # Dashboard de Grafana como ConfigMap (lo levanta el sidecar de Grafana por el label). Opt-in.
  grafanaDashboard:
    enabled: false
    label: grafana_dashboard   # label que busca el sidecar (kube-prometheus-stack: grafana_dashboard)
  # Métricas POR JUGADOR (SDD 21): game_player_online{player,galaxy}. Opt-in por cardinalidad —
  # solo para deploys chicos/privados (el username queda en Prometheus interno).
  perPlayer:
    enabled: false

# Legacy / fallback. El token nunca al repo: usá --set o un values-local.yaml gitignored.
openrouter:
  apiKey: ""                   # ej: helm install ... --set openrouter.apiKey=sk-or-...
  baseUrl: "https://openrouter.ai/api/v1"
  model: "google/gemma-4-31b-it:free"

postgres:
  enabled: true
  user: game
  password: game
  db: game
  image: postgres:16-alpine
  # Usar un Postgres EXTERNO (managed / operador con PITR). Si lo seteás, poné enabled=false:
  #   --set postgres.enabled=false --set postgres.externalUrl=postgresql+asyncpg://user:pass@host:5432/db
  externalUrl: ""
  # Almacenamiento persistente: el PVC sobrevive a que el pod muera (SDD 10). enabled=false usa
  # emptyDir (efímero, SOLO para pruebas — se pierde al reprogramar el pod).
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""            # "" = StorageClass por defecto del cluster

# Backup lógico opt-in (pg_dump -Fc a un PVC local, con retención). Para prod: mandar offsite +
# cifrado, o WAL/PITR con operador. Ver docs/sdd-durability-backup-restore.md.
backup:
  enabled: false
  schedule: "0 3 * * *"
  retentionDays: 7
  size: 8Gi
  storageClass: ""

redis:
  enabled: true
  image: redis:7-alpine
