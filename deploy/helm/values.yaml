image:
  # La CI publica una imagen multi-arch (amd64+arm64) en GHCR. Para un cluster local
  # (kind/minikube) podés override con --set image.repository=online-game image.tag=0.1.0
  repository: ghcr.io/villadalmine/online-game
  tag: "latest"
  pullPolicy: Always

# Si el paquete de GHCR es privado, creá un secret y referencialo:
#   kubectl create secret docker-registry ghcr --docker-server=ghcr.io \
#     --docker-username=USER --docker-password=GH_TOKEN
# imagePullSecrets: [ghcr]
imagePullSecrets: []

# Restringí los pods de la app a una arquitectura si la imagen no es multi-arch.
# Ej (cluster mixto / imagen arm64 de Kaniko): --set nodeSelector."kubernetes\.io/arch"=arm64
nodeSelector: {}

# Exponer vía Gateway API (ej. Cilium). Activá con --set gateway.enabled=true
# El HTTPRoute se engancha al Gateway `name`/`namespace` y enruta por `host` (el DOMINIO va acá).
# TLS: termina en el GATEWAY, no en este chart. Para HTTPS con cert público, agregá un listener
# HTTPS al Gateway con la annotation de cert-manager — ver deploy/gateway-tls/ (ClusterIssuer
# Let's Encrypt + listener). El HTTPRoute liga por hostname al listener que matchee `host`.
gateway:
  enabled: false
  host: online-game.cluster.home   # ej --set gateway.host=tu-dominio.example
  name: cluster-gateway
  namespace: gateway

api:
  replicas: 2
  port: 8000
  # Resource requests/limits: SIN requests el HPA no puede escalar por CPU (SDD 7). Tunear
  # con un load test (tests/load/). requests = lo que reserva; limits = el techo por pod.
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# Autoscaling de la API (SDD 7). Opt-in: cuando enabled=true, el HPA maneja las réplicas
# (se ignora api.replicas). Necesita metrics-server y api.resources.requests.cpu.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 0   # 0 = sólo CPU

# No tirar todas las réplicas juntas en drains/upgrades (SDD 7).
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: 0

# Repartir las réplicas de la API entre nodos/zonas (SDD 7). Ej:
#   - maxSkew: 1
#     topologyKey: kubernetes.io/hostname
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector: { matchLabels: { app: RELEASE-api } }
topologySpreadConstraints: []

# Ajustes de capacidad de la app (SDD 7): SSE y pool de DB. Subir streamInterval baja la
# carga DB del SSE; dbPoolSize × maxReplicas ≤ max_connections de Postgres (techo real).
scaling:
  streamInterval: ""   # ej "5" (s). Vacío = default de la app (2 s)
  dbPoolSize: ""       # ej "5" por réplica
  dbMaxOverflow: ""    # ej "10"

worker:
  # CronJob schedule for the periodic tick (build queues, mines, future combat/AI).
  schedule: "*/5 * * * *"
  # El tick es O(N) (recorre todos los players); a escala, shardear por galaxia (SDD 8).
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

env:
  ENVIRONMENT: production
  JWT_SECRET: change-me
  REDIS_ENABLED: "true"
  AUTO_TICK_SECONDS: "0"        # 0 = usar el CronJob (multi-réplica); >0 corre tick in-process
  ENERGY_REGEN_PER_HOUR: "10"
  ENERGY_MAX: "240"
  ENERGY_START: "60"

# NPCs con IA. Para usar LLM: brain=llm. El chart es agnóstico del proveedor: apuntá a
# CUALQUIER endpoint OpenAI-compatible (OpenRouter, LiteLLM, Ollama, vLLM) con llm.*.
# El chart NO levanta ningún LLM: vos corrés Ollama/LiteLLM donde quieras y le pasás la URL.
# Si llm.apiKey está vacío y no hay openrouter.apiKey, NPC_BRAIN cae a reglas igual.
npc:
  brain: "rules"               # rules | llm

# llm.* tiene prioridad; si lo dejás vacío, se usan los openrouter.* de abajo (compat).
llm:
  baseUrl: ""                  # ej http://litellm.litellm:4000/v1  ·  http://ollama.ollama:11434/v1
  model: ""                    # ej llama3.1:8b
  apiKey: ""                   # va a un Secret; para Ollama poné cualquier cosa (lo ignora)
  jsonMode: "true"             # response_format=json_object (apagá si tu server no lo soporta)
  # GPU local serial (SDD 9): el timeout corta la espera y dispara el fallback. Para una P4
  # con 7B podés necesitar subirlo; con 3-4B baja. El serving (Ollama/LiteLLM) corre FUERA
  # del chart — ver deploy/gpu-llm/. Vacío = default de la app (20 s).
  timeoutSeconds: ""           # ej "30"

# Legacy / fallback. El token nunca al repo: usá --set o un values-local.yaml gitignored.
openrouter:
  apiKey: ""                   # ej: helm install ... --set openrouter.apiKey=sk-or-...
  baseUrl: "https://openrouter.ai/api/v1"
  model: "google/gemma-4-31b-it:free"

postgres:
  enabled: true
  user: game
  password: game
  db: game
  image: postgres:16-alpine
  # Usar un Postgres EXTERNO (managed / operador con PITR). Si lo seteás, poné enabled=false:
  #   --set postgres.enabled=false --set postgres.externalUrl=postgresql+asyncpg://user:pass@host:5432/db
  externalUrl: ""
  # Almacenamiento persistente: el PVC sobrevive a que el pod muera (SDD 10). enabled=false usa
  # emptyDir (efímero, SOLO para pruebas — se pierde al reprogramar el pod).
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""            # "" = StorageClass por defecto del cluster

# Backup lógico opt-in (pg_dump -Fc a un PVC local, con retención). Para prod: mandar offsite +
# cifrado, o WAL/PITR con operador. Ver docs/sdd-durability-backup-restore.md.
backup:
  enabled: false
  schedule: "0 3 * * *"
  retentionDays: 7
  size: 8Gi
  storageClass: ""

redis:
  enabled: true
  image: redis:7-alpine
