{{- if .Values.metrics.serviceMonitor.enabled }}
# ServiceMonitor (Prometheus Operator) para scrapear /metrics del Service de la API (SDD 19).
# Scrapeo IN-CLUSTER por el Service (no por el gateway público). Si metrics.token está seteado,
# manda el Bearer vía bearerTokenSecret (el mismo Secret del release).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-api
  {{- with .Values.metrics.serviceMonitor.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval | quote }}
      {{- if .Values.metrics.token }}
      bearerTokenSecret:
        name: {{ .Release.Name }}-secrets
        key: METRICS_TOKEN
      {{- end }}
{{- end }}
