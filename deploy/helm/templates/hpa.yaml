{{- if .Values.autoscaling.enabled }}
# HorizontalPodAutoscaler para la API (SDD 7). Requiere requests de CPU (api.resources) y
# metrics-server. Para escalar por rps/pod usá una métrica custom (KEDA / Prometheus-adapter).
# OJO: la API escala horizontal, pero Postgres es un solo escritor → el techo real son las
# conexiones (pool_size × maxReplicas ≤ max_connections) y el tick O(N); ver SDD 7/8.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-api
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
