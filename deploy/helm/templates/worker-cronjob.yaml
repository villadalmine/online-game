apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-tick
spec:
  schedule: {{ .Values.worker.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
{{ include "online-game.imagePullSecrets" . | indent 10 }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: Never
          containers:
            - name: tick
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["python", "-m", "app.worker"]
              env:
{{ include "online-game.commonEnv" . | indent 16 }}
              {{- with .Values.worker.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
