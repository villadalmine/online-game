# Secret de app: TODO lo sensible va acá (y se consume por secretKeyRef en _helpers.tpl), nunca como
# `value:` en texto plano en el Deployment. Los VALORES vienen de values-local (que Helm guarda en su
# Secret de release) y se reusan en el CD con --reset-then-reuse-values → Argo nunca toca secretos.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
stringData:
  # Siempre presentes (la app aborta en production si JWT_SECRET es débil) → en Secret, no en env plano.
  JWT_SECRET: {{ .Values.env.JWT_SECRET | quote }}
  DATABASE_URL: {{ include "online-game.dbUrl" . | quote }}
{{- if .Values.llm.apiKey }}
  LLM_API_KEY: {{ .Values.llm.apiKey | quote }}
{{- end }}
{{- if .Values.openrouter.apiKey }}
  OPENROUTER_API_KEY: {{ .Values.openrouter.apiKey | quote }}
{{- end }}
{{- if .Values.mail.resendApiKey }}
  RESEND_API_KEY: {{ .Values.mail.resendApiKey | quote }}
{{- end }}
{{- if .Values.mail.otpSecret }}
  OTP_SECRET: {{ .Values.mail.otpSecret | quote }}
{{- end }}
{{- if .Values.metrics.token }}
  METRICS_TOKEN: {{ .Values.metrics.token | quote }}
{{- end }}
