# Overlay de PRODUCCIĂ“N â€” SIN secretos. Lo aplica el pipeline de CD (paso promote) con
# `--reset-then-reuse-values -f`: los secretos/dominio siguen viniendo de values-local (reused),
# y acĂˇ vive la config de HA/capacidad VERSIONADA (SDD 7). Para cambiarla: editĂˇs esto y deployĂˇs
# por Argo (`make deploy`) â€” nada manual a prod. Ver docs/sdd-capacity-autoscaling.md.

api:
  replicas: 3                  # HA: 3 rĂ©plicas â†’ sin downtime en deploy/restart/caĂ­da de un nodo

# Cluster MIXTO de arquitecturas: prod corre en nodos arm64 y Kaniko produce imĂˇgenes de UNA arch
# (la del nodo donde buildea). Pineamos el runtime a arm64 para que NUNCA se agende la imagen arm en
# el nodo amd64 (srv-t7910) â†’ evita `exec format error`. (El CD tambiĂ©n buildea en arm64; ver
# deploy/build/online-game-cicd.yaml.) Incidente 2026-06-29.
nodeSelector:
  kubernetes.io/arch: arm64

# No tirar todas las rĂ©plicas juntas en drains/upgrades.
podDisruptionBudget:
  enabled: true
  minAvailable: ""             # vacĂ­o â†’ usa maxUnavailable (sirve con cualquier nÂş de rĂ©plicas)
  maxUnavailable: 1

# Repartir las rĂ©plicas entre nodos (soft: no bloquea el scheduling si no se puede repartir).
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app: galaxy-api

# Capacidad (SDD 7): pool por rĂ©plica acotado para que entren varias rĂ©plicas sin agotar Postgres.
scaling:
  dbPoolSize: "8"              # (8+12)=20 conexiones Ă— 3 rĂ©plicas = 60, holgado bajo maxConnections=200
  dbMaxOverflow: "12"

postgres:
  maxConnections: 200         # mĂˇs conexiones para soportar mĂˇs rĂ©plicas/queries (default era 100)
  sharedBuffers: "256MB"

# Flags de juego (SDD 62): guarniciĂłn â€” tropas/obreros por base, el combate usa solo la base atacada,
# capacidad por planeta y mover tropas. El backfill (migraciĂłn b8f1c2a4e6d0) ya moviĂł las unidades
# globales a la base natal. Reversible (ponĂ© "false"). Ver docs/sdd-garrison-troops-per-base.md.
# SDD 61: satĂ©lites â€” aditivo y de bajo riesgo (nadie tiene satĂ©lites hasta construirlos tras un Ăˇrbol
# de research carĂ­simo). Reversible. Ver docs/sdd-satellites-recon.md.
env:
  GARRISON_ENABLED: "true"
  SATELLITES_ENABLED: "true"
  # SDD 64: bĂşnkeres â€” aditivo, gateado por research (nuclear_fission â†’ bunker_engineering) y el
  # sabotaje ademĂˇs exige mapear con satĂ©lites (â‰Ą50%). Reversible. Ver docs/sdd-atomic-bunkers.md.
  BUNKERS_ENABLED: "true"
  # SDD 66: los misiles/bombardeo daĂ±an la CONDICIĂ“N (gradual) en vez de destruir de una; habilita
  # reparar. Da mĂˇs peso a la defensa (cruza el balance de torretas). Ver docs/sdd-building-condition-upgrades.md.
  BUILDING_CONDITION_ENABLED: "true"
  # SDD 63: salto espacial (jumpers) â€” aditivo, gateado por el capstone `space_jump` (requiere TODO el
  # Ăˇrbol endgame). Nadie lo tiene hasta investigarlo. Reversible. Ver docs/sdd-space-jump-jumpers.md.
  SPACE_JUMP_ENABLED: "true"
  # SDD 69 Fase 1: expansiĂłn subterrĂˇnea (â›Ź excavar) â€” gateado por tech underground_construction.
  BUNKER_EXPANSION_ENABLED: "true"
  # SDD 69 Fase 4: vida artificial â€” subir niveles de IA (gateado por tech artificial_life + electrĂłnica)
  # y AUTOPILOTO de robots (staffingâ†’minasâ†’comercioâ†’colonizaciĂłnâ†’ATAQUE). Arranca suave: reciĂ©n actĂşa
  # cuando cada jugador desarrolla la IA (ataque solo a nivel 5); tiene botĂłn de parada por jugador.
  # ElecciĂłn del usuario 2026-07-03: autonomĂ­a plena incluido ataque. Reversible. docs/sdd-bunker-reserve-civilization.md.
  ARTIFICIAL_LIFE_ENABLED: "true"
  BUNKER_AUTONOMY_ENABLED: "true"
  # SDD 75: terraformaciĂłn â€” la sala Terraformador (tech terraforming) agranda el bĂşnker +3 de lado.
  TERRAFORMING_ENABLED: "true"
  # SDD 76: salto cuĂˇntico â€” la Puerta cuĂˇntica (tech quantum_jump) teletransporta electrĂłnica de un
  # bĂşnker a otro (merma 10%). Para consolidar la reserva y recuperarte. Reversible.
