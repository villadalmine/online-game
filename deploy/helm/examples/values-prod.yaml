# Overlay de PRODUCCIÓN — SIN secretos. Lo aplica el pipeline de CD (paso promote) con
# `--reset-then-reuse-values -f`: los secretos/dominio siguen viniendo de values-local (reused),
# y acá vive la config de HA/capacidad VERSIONADA (SDD 7). Para cambiarla: editás esto y deployás
# por Argo (`make deploy`) — nada manual a prod. Ver docs/sdd-capacity-autoscaling.md.

api:
  replicas: 3                  # HA: 3 réplicas → sin downtime en deploy/restart/caída de un nodo

# Cluster MIXTO de arquitecturas: prod corre en nodos arm64 y Kaniko produce imágenes de UNA arch
# (la del nodo donde buildea). Pineamos el runtime a arm64 para que NUNCA se agende la imagen arm en
# el nodo amd64 (srv-t7910) → evita `exec format error`. (El CD también buildea en arm64; ver
# deploy/build/online-game-cicd.yaml.) Incidente 2026-06-29.
nodeSelector:
  kubernetes.io/arch: arm64
  storage: rk1-longhorn            # como los pods que ya corren OK (srv-rk1-nvme-04)
  # borra el pin heredado al nodo srv-super6c-01-nvme (eliminado en el mant.) que traía el
  # `--reset-then-reuse-values` desde un helm upgrade manual con values-local → dejaba el pod Pending.
  kubernetes.io/hostname: null

# No tirar todas las réplicas juntas en drains/upgrades.
podDisruptionBudget:
  enabled: true
  minAvailable: ""             # vacío → usa maxUnavailable (sirve con cualquier nº de réplicas)
  maxUnavailable: 1

# Repartir las réplicas entre nodos (soft: no bloquea el scheduling si no se puede repartir).
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app: galaxy-api

# Capacidad (SDD 7): pool por réplica acotado para que entren varias réplicas sin agotar Postgres.
scaling:
  dbPoolSize: "8"              # (8+12)=20 conexiones × 3 réplicas = 60, holgado bajo maxConnections=200
  dbMaxOverflow: "12"

postgres:
  maxConnections: 200         # más conexiones para soportar más réplicas/queries (default era 100)
  sharedBuffers: "256MB"

# LLM: la GPU local (srv-t7910 / ollama) está APAGADA por mantenimiento (2026-07-08). El CD promueve
# con ESTE archivo, así que fijamos acá el modelo cloud para que un deploy NO revierta a local-gpu
# (values-local ya lo tenía, pero el CD no lo lee). ⟳ ROLLBACK al re-prender la GPU: volver a
# `local-gpu` (o borrar este bloque) y `make deploy`. Ver CHANGELOG Ops 2026-07-08.
# AHORRO 2026-07-20 (dueño, meta €20/mes): gemma4-paid → `cheap` (deepseek-v4-flash vía LiteLLM,
# $0.098/M in vs $0.22/M — el workload del tick es ~95% input ⇒ -55%). Benchmark del mismo día
# (repo shooter): 3/3 chat-pattern, respeta max_tokens. Aplicado también en runtime por kubectl
# (sin `make deploy`: el pipeline completo re-crearía galaxy-dt, borrado ese mismo día).
llm:
  model: "cheap"

# AHORRO 2026-07-20 (2/2): el tick pasa de cada 5 → cada 10 minutos (mitad de decisiones LLM/día).
# Junto con el modelo barato: ~$0.35/día → ~$0.08/día. Revertir = borrar este bloque (default */5).
worker:
  schedule: "*/10 * * * *"

# Flags de juego (SDD 62): guarnición — tropas/obreros por base, el combate usa solo la base atacada,
# capacidad por planeta y mover tropas. El backfill (migración b8f1c2a4e6d0) ya movió las unidades
# globales a la base natal. Reversible (poné "false"). Ver docs/sdd-garrison-troops-per-base.md.
# SDD 61: satélites — aditivo y de bajo riesgo (nadie tiene satélites hasta construirlos tras un árbol
# de research carísimo). Reversible. Ver docs/sdd-satellites-recon.md.
env:
  GARRISON_ENABLED: "true"
  SATELLITES_ENABLED: "true"
  # SDD 64: búnkeres — aditivo, gateado por research (nuclear_fission → bunker_engineering) y el
  # sabotaje además exige mapear con satélites (≥50%). Reversible. Ver docs/sdd-atomic-bunkers.md.
  BUNKERS_ENABLED: "true"
  # SDD 66: los misiles/bombardeo dañan la CONDICIÓN (gradual) en vez de destruir de una; habilita
  # reparar. Da más peso a la defensa (cruza el balance de torretas). Ver docs/sdd-building-condition-upgrades.md.
  BUILDING_CONDITION_ENABLED: "true"
  # SDD 63: salto espacial (jumpers) — aditivo, gateado por el capstone `space_jump` (requiere TODO el
  # árbol endgame). Nadie lo tiene hasta investigarlo. Reversible. Ver docs/sdd-space-jump-jumpers.md.
  SPACE_JUMP_ENABLED: "true"
  # SDD 69 Fase 1: expansión subterránea (⛏ excavar) — gateado por tech underground_construction.
  BUNKER_EXPANSION_ENABLED: "true"
  # SDD 69 Fase 4: vida artificial — subir niveles de IA (gateado por tech artificial_life + electrónica)
  # y AUTOPILOTO de robots (staffing→minas→comercio→colonización→ATAQUE). Arranca suave: recién actúa
  # cuando cada jugador desarrolla la IA (ataque solo a nivel 5); tiene botón de parada por jugador.
  # Elección del usuario 2026-07-03: autonomía plena incluido ataque. Reversible. docs/sdd-bunker-reserve-civilization.md.
  ARTIFICIAL_LIFE_ENABLED: "true"
  BUNKER_AUTONOMY_ENABLED: "true"
  # SDD 81: el autopiloto puede PENSAR con el LLM (gpu/cloud/auto) por jugador (default determinista).
  AI_AUTOPILOT_BRAIN_ENABLED: "true"
  # SDD 83: modo AGENTE — con ai_brain_mode="agent" el LLM EJECUTA acciones él mismo (transportar
  # minerales entre bases, construir, entrenar, investigar) vía loop de acción-JSON. Opt-in por
  # jugador, con presupuesto diario + botón STOP + fallback al determinista. Reversible.
  AI_AGENT_ENABLED: "true"
  # SDD 87: bomba cuántica — gusano de IA que infecta/drena una base rival (arsenal intra-planeta,
  # gate tech quantum_warfare); se desactiva con tropas/rescate/tech (esta última deja fuga de info
  # hasta poner un satélite inhibidor). Reversible.
  QUANTUM_BOMB_ENABLED: "true"
  # SDD 89: Domo de terraformación — juntar el SET de catalizadores exóticos de TODAS las lunas de tu
  # galaxia (por expedición) habilita fundar un HQ-Domo en un mundo LETAL (colonizar lo imposible).
  # Sink de endgame para los materiales raros. Reversible.
  TERRAFORM_DOME_ENABLED: "true"
  # SDD 75: terraformación — la sala Terraformador (tech terraforming) agranda el búnker +3 de lado.
  TERRAFORMING_ENABLED: "true"
  # SDD 76: salto cuántico — la Puerta cuántica (tech quantum_jump) teletransporta electrónica de un
  # búnker a otro (merma 10%). Para consolidar la reserva y recuperarte. Reversible.
  QUANTUM_TELEPORT_ENABLED: "true"
  # SDD 77: la IA le escribe sola al jugador (mensaje proactivo) ante algo urgente (ataque entrante,
  # energía crítica), con cooldown. Determinista, no gasta LLM. Reversible.
  ADVISOR_PROACTIVE_ENABLED: "true"
  # Lanzamiento abierto: cualquier usuario puede registrarse
  ALLOWED_EMAILS: ""
  SIGNUP_REQUIRES_APPROVAL: "false"
  # Límite de capacidad (100 jugadores en prod)
  SEASON_CAPACITY: "100"
