# CD CON GATE DE TESTS (SDD 44 + 45): build + tests (e2e API + Chrome) + promote a prod, en un
# Workflow. Si los tests NO pasan, promote-prod NO corre → prod queda intacto.
# El tag de imagen es un PARÁMETRO (no se edita el YAML).
#
# Pre-requisito (una vez): kubectl apply -f deploy/build/cicd-rbac.yaml
# Disparar:                make deploy V=<X.Y.Z>
#   (= argo submit deploy/build/online-game-cicd.yaml -n kaniko -p image_tag=<X.Y.Z> --watch)
#
# Emergencia (sin gate): make deploy-force V=<X.Y.Z>  (ver SDD 45 §8 F3).
# Instancia de testing real para smoke manual: make dt-up V=<tag> (galaxy-dt, SDD 45 §5).
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: cicd-online-game-
  namespace: kaniko
  labels:
    app: online-game-cicd
spec:
  entrypoint: pipeline
  serviceAccountName: og-deployer
  arguments:
    parameters:
      - name: image_tag
        value: "latest"
  ttlStrategy:
    secondsAfterSuccess: 1800     # 30 min: borra el Workflow (y sus pods por ownerRef) tras éxito
    secondsAfterFailure: 7200     # 2 h: el OBJETO Workflow (con el status: qué paso falló) queda para debug; los PODS se van ya (podGC)
  # LIMPIEZA DE PODS — `OnWorkflowCompletion` borra los pods APENAS termina el workflow, EXITOSO O FALLIDO.
  # Antes era `OnWorkflowSuccess` (para conservar logs de fallos), pero los pods fallidos se apilaban hasta 4 h y, con
  # el ns `kaniko` COMPARTIDO, saturaban el controlador de Argo → atrasaba el `Succeeded` de OTROS pipelines y rompía sus
  # deploys (incidente 2026-06-28). Para debug alcanza el `status` del Workflow (que el ttl deja 2 h); si hace falta el
  # log de un fallo, re-correr. El churn de pods NO puede tirar abajo el controlador del ns compartido.
  podGC:
    strategy: OnWorkflowCompletion
  nodeSelector:
    kubernetes.io/hostname: srv-rk1-nvme-01    # arm64, como el nodo del juego
  tolerations:
    - key: "node.kubernetes.io/unreachable"
      operator: Exists
      effect: NoExecute
    - key: "node.kubernetes.io/not-ready"
      operator: Exists
      effect: NoExecute
  volumeClaimTemplates:
    # PVC efímera del workflow (Longhorn-NVMe): Argo la crea al arrancar y la BORRA al terminar.
    # Aloja la fuente, el contexto y el TMPDIR de Kaniko (ver env TMPDIR abajo) → el grueso del scratch
    # va a NVMe-Longhorn, NO al SD/eMMC interno del nodo. Más grande para que entre el tmp de Kaniko.
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn-nvme
        resources:
          requests:
            storage: 20Gi
  templates:
    - name: pipeline
      dag:
        tasks:
          - name: build               # imagen del juego
            template: build-image
          - name: build-test          # imagen de test (con Chromium horneado, SDD 45 §4)
            template: build-test-image
          - name: e2e-api             # GATE 1: suite API (pytest -m "not chrome")
            template: test-api
            dependencies: [build-test]
          - name: e2e-chrome          # GATE 2: tests de UI con browser real (pytest -m chrome)
            template: test-chrome
            dependencies: [build-test]
          - name: promote-prod        # solo si build + ambos gates pasaron
            template: helm-promote
            dependencies: [build, e2e-api, e2e-chrome]

    # ---- build de la imagen del juego (Kaniko) ----
    - name: build-image
      inputs:
        artifacts:
          - name: source
            path: /workspace/source
            git: { repo: "https://github.com/villadalmine/online-game.git", revision: main, depth: 1 }
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - "--dockerfile=/workspace/source/deploy/Dockerfile"
          - "--context=dir:///workspace/source"
          - "--destination=registry.registry:5000/online-game:{{workflow.parameters.image_tag}}"
          - "--insecure"
          - "--skip-tls-verify"
          - "--snapshot-mode=redo"
          - "--compression=zstd"
          - "--compression-level=1"
        env:
          # SDD: mandamos el scratch de Kaniko a la PVC Longhorn-NVMe (no al SD/eMMC del nodo).
          - { name: TMPDIR, value: /workspace }
        resources:
          # El grueso del scratch va a la PVC (TMPDIR). El ephemeral-storage del NODO solo lo usa el
          # rootfs del contenedor (overlay) durante la extracción; lo acotamos para no presionar el
          # disco del nodo (un build desbocado se autoexpulsa). Ver pending-next-session / SDD 44-45.
          requests: { cpu: "1", memory: "2Gi", ephemeral-storage: "2Gi" }
          limits: { cpu: "4", memory: "8Gi", ephemeral-storage: "6Gi" }
        volumeMounts: [{ name: workspace, mountPath: /workspace }]

    # ---- build de la imagen de TEST (Kaniko, Dockerfile.test) ----
    - name: build-test-image
      inputs:
        artifacts:
          - name: source
            path: /workspace/test-src
            git: { repo: "https://github.com/villadalmine/online-game.git", revision: main, depth: 1 }
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - "--dockerfile=/workspace/test-src/deploy/Dockerfile.test"
          - "--context=dir:///workspace/test-src"
          - "--destination=registry.registry:5000/online-game-test:{{workflow.parameters.image_tag}}"
          - "--insecure"
          - "--skip-tls-verify"
          - "--snapshot-mode=redo"
          - "--compression=zstd"
          - "--compression-level=1"
        env:
          # SDD: mandamos el scratch de Kaniko a la PVC Longhorn-NVMe (no al SD/eMMC del nodo).
          - { name: TMPDIR, value: /workspace }
        resources:
          # El grueso del scratch va a la PVC (TMPDIR). El ephemeral-storage del NODO solo lo usa el
          # rootfs del contenedor (overlay) durante la extracción; lo acotamos para no presionar el
          # disco del nodo (un build desbocado se autoexpulsa). Ver pending-next-session / SDD 44-45.
          requests: { cpu: "1", memory: "2Gi", ephemeral-storage: "2Gi" }
          limits: { cpu: "4", memory: "8Gi", ephemeral-storage: "6Gi" }
        volumeMounts: [{ name: workspace, mountPath: /workspace }]

    # ---- GATE 1: e2e API (la imagen de test es self-contained: SQLite + fakeredis) ----
    - name: test-api
      container:
        image: registry.registry:5000/online-game-test:{{workflow.parameters.image_tag}}
        command: ["python", "-m", "pytest", "-m", "not chrome", "-q"]
        workingDir: /app
        resources:
          # ephemeral-storage request: sin esto el pod es BestEffort en disco efímero y es el PRIMERO
          # en ser evictado si el NODO entra en DiskPressure (p.ej. por builds Kaniko concurrentes).
          # Usa ~5Mi reales; el request lo protege de la evicción (queda último en la cola del kubelet).
          requests: { cpu: "1", memory: "1Gi", ephemeral-storage: "1Gi" }
          limits: { cpu: "2", memory: "4Gi", ephemeral-storage: "2Gi" }

    # ---- GATE 2: e2e Chrome (Playwright; el test levanta su propio uvicorn efímero) ----
    - name: test-chrome
      container:
        image: registry.registry:5000/online-game-test:{{workflow.parameters.image_tag}}
        command: ["python", "-m", "pytest", "-m", "chrome", "tests/test_web_smoke.py", "-q"]
        workingDir: /app
        env:
          - { name: ALLOWED_EMAILS, value: "" }
          - { name: SIGNUP_REQUIRES_APPROVAL, value: "false" }
        resources:
          # ephemeral-storage request (ver test-api): protege al pod de la evicción por DiskPressure
          # del nodo. Chromium + el uvicorn efímero usan algo de disco; 1Gi de piso, 2Gi de techo.
          requests: { cpu: "1", memory: "2Gi", ephemeral-storage: "1Gi" }
          limits: { cpu: "2", memory: "4Gi", ephemeral-storage: "2Gi" }

    # ---- promote a PROD (solo tras gates verdes): helm upgrade --reuse-values (SDD 44) ----
    - name: helm-promote
      inputs:
        artifacts:
          - name: source
            path: /workspace/chart-src
            git: { repo: "https://github.com/villadalmine/online-game.git", revision: main, depth: 1 }
      container:
        image: dtzar/helm-kubectl:3.16.2
        command: ["sh", "-c"]
        args:
          - |
            set -e
            # NOTA (2026-06-27): el `helm upgrade --wait` marcaba la release 'failed' por RBAC, NO por
            # timeout — el chart administra un Certificate (ns gateway) y ClusterIssuers que helm GETea
            # en el 3-way merge, y `og-deployer` no tenía permiso (ver deploy/build/cicd-rbac.yaml).
            # El Deployment igual se aplicaba (el pod quedaba en la versión nueva). Fix: el RBAC de
            # cert-manager en cicd-rbac.yaml. El timeout de 15m queda holgado por si el rollout arm tarda.
            # Config VERSIONADA de HA/capacidad por `-f values-prod.yaml` (SDD 7); los secretos/
            # dominio siguen viniendo de la release previa por `--reset-then-reuse-values` (Helm 3.14+;
            # reusa los valores del último release y aplica -f/--set encima — a diferencia de
            # `--reuse-values`, que IGNORA -f). Así toda la config no-secreta vive en git y va por CD.
            helm upgrade galaxy /workspace/chart-src/deploy/helm \
              -n online-game \
              --reset-then-reuse-values \
              -f /workspace/chart-src/deploy/helm/examples/values-prod.yaml \
              --set image.tag={{workflow.parameters.image_tag}} \
              --wait --timeout 15m
            kubectl rollout status deploy/galaxy-api -n online-game --timeout=600s
        volumeMounts: [{ name: workspace, mountPath: /workspace }]
