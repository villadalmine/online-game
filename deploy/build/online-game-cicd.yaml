# CD CON GATE DE TESTS (SDD 44 + 45): build + tests (e2e API + Chrome) + promote a prod, en un
# Workflow. Si los tests NO pasan, promote-prod NO corre → prod queda intacto.
# El tag de imagen es un PARÁMETRO (no se edita el YAML).
#
# Pre-requisito (una vez): kubectl apply -f deploy/build/cicd-rbac.yaml
# Disparar:                make deploy V=<X.Y.Z>
#   (= argo submit deploy/build/online-game-cicd.yaml -n kaniko -p image_tag=<X.Y.Z> --watch)
#
# Emergencia (sin gate): make deploy-force V=<X.Y.Z>  (ver SDD 45 §8 F3).
# Instancia de testing real para smoke manual: make dt-up V=<tag> (galaxy-dt, SDD 45 §5).
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: cicd-online-game-
  namespace: kaniko
  labels:
    app: online-game-cicd
spec:
  entrypoint: pipeline
  serviceAccountName: og-deployer
  arguments:
    parameters:
      - name: image_tag
        value: "latest"
  ttlStrategy:
    secondsAfterSuccess: 3600
    secondsAfterFailure: 86400
  nodeSelector:
    kubernetes.io/hostname: srv-rk1-nvme-01    # arm64, como el nodo del juego
  tolerations:
    - key: "node.kubernetes.io/unreachable"
      operator: Exists
      effect: NoExecute
    - key: "node.kubernetes.io/not-ready"
      operator: Exists
      effect: NoExecute
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn-nvme
        resources:
          requests:
            storage: 8Gi
  templates:
    - name: pipeline
      dag:
        tasks:
          - name: build               # imagen del juego
            template: build-image
          - name: build-test          # imagen de test (con Chromium horneado, SDD 45 §4)
            template: build-test-image
          - name: e2e-api             # GATE 1: suite API (pytest -m "not chrome")
            template: test-api
            dependencies: [build-test]
          - name: e2e-chrome          # GATE 2: tests de UI con browser real (pytest -m chrome)
            template: test-chrome
            dependencies: [build-test]
          - name: promote-prod        # solo si build + ambos gates pasaron
            template: helm-promote
            dependencies: [build, e2e-api, e2e-chrome]

    # ---- build de la imagen del juego (Kaniko) ----
    - name: build-image
      inputs:
        artifacts:
          - name: source
            path: /workspace/source
            git: { repo: "https://github.com/villadalmine/online-game.git", revision: main, depth: 1 }
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - "--dockerfile=/workspace/source/deploy/Dockerfile"
          - "--context=dir:///workspace/source"
          - "--destination=registry.registry:5000/online-game:{{workflow.parameters.image_tag}}"
          - "--insecure"
          - "--skip-tls-verify"
          - "--snapshot-mode=redo"
          - "--compression=zstd"
          - "--compression-level=1"
        resources:
          # ephemeral-storage: Kaniko extrae las capas al disco efímero del NODO (no la PVC ni la DB).
          # Con dos builds en paralelo (juego + test) eso llenaba el nodo → evicción. Reservamos un
          # piso (request) y ponemos techo (limit) para que un build desbocado se autoexpulse en vez
          # de presionar al nodo y evictar vecinos. Ver pending-next-session / SDD 44-45.
          requests: { cpu: "1", memory: "2Gi", ephemeral-storage: "4Gi" }
          limits: { cpu: "4", memory: "8Gi", ephemeral-storage: "8Gi" }
        volumeMounts: [{ name: workspace, mountPath: /workspace }]

    # ---- build de la imagen de TEST (Kaniko, Dockerfile.test) ----
    - name: build-test-image
      inputs:
        artifacts:
          - name: source
            path: /workspace/test-src
            git: { repo: "https://github.com/villadalmine/online-game.git", revision: main, depth: 1 }
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - "--dockerfile=/workspace/test-src/deploy/Dockerfile.test"
          - "--context=dir:///workspace/test-src"
          - "--destination=registry.registry:5000/online-game-test:{{workflow.parameters.image_tag}}"
          - "--insecure"
          - "--skip-tls-verify"
          - "--snapshot-mode=redo"
          - "--compression=zstd"
          - "--compression-level=1"
        resources:
          # ephemeral-storage: Kaniko extrae las capas al disco efímero del NODO (no la PVC ni la DB).
          # Con dos builds en paralelo (juego + test) eso llenaba el nodo → evicción. Reservamos un
          # piso (request) y ponemos techo (limit) para que un build desbocado se autoexpulse en vez
          # de presionar al nodo y evictar vecinos. Ver pending-next-session / SDD 44-45.
          requests: { cpu: "1", memory: "2Gi", ephemeral-storage: "4Gi" }
          limits: { cpu: "4", memory: "8Gi", ephemeral-storage: "8Gi" }
        volumeMounts: [{ name: workspace, mountPath: /workspace }]

    # ---- GATE 1: e2e API (la imagen de test es self-contained: SQLite + fakeredis) ----
    - name: test-api
      container:
        image: registry.registry:5000/online-game-test:{{workflow.parameters.image_tag}}
        command: ["python", "-m", "pytest", "-m", "not chrome", "-q"]
        workingDir: /app
        resources:
          requests: { cpu: "1", memory: "1Gi" }
          limits: { cpu: "2", memory: "4Gi" }

    # ---- GATE 2: e2e Chrome (Playwright; el test levanta su propio uvicorn efímero) ----
    - name: test-chrome
      container:
        image: registry.registry:5000/online-game-test:{{workflow.parameters.image_tag}}
        command: ["python", "-m", "pytest", "-m", "chrome", "tests/test_web_smoke.py", "-q"]
        workingDir: /app
        env:
          - { name: ALLOWED_EMAILS, value: "" }
          - { name: SIGNUP_REQUIRES_APPROVAL, value: "false" }
        resources:
          requests: { cpu: "1", memory: "2Gi" }
          limits: { cpu: "2", memory: "4Gi" }

    # ---- promote a PROD (solo tras gates verdes): helm upgrade --reuse-values (SDD 44) ----
    - name: helm-promote
      inputs:
        artifacts:
          - name: source
            path: /workspace/chart-src
            git: { repo: "https://github.com/villadalmine/online-game.git", revision: main, depth: 1 }
      container:
        image: dtzar/helm-kubectl:3.16.2
        command: ["sh", "-c"]
        args:
          - |
            set -e
            helm upgrade galaxy /workspace/chart-src/deploy/helm \
              -n online-game \
              --reuse-values \
              --set image.tag={{workflow.parameters.image_tag}} \
              --wait --timeout 8m
            kubectl rollout status deploy/galaxy-api -n online-game --timeout=300s
        volumeMounts: [{ name: workspace, mountPath: /workspace }]
