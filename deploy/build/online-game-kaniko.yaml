# Build de la imagen online-game con Kaniko vía Argo Workflows (in-cluster, arm64).
# NOTA: este Workflow es BUILD-ONLY (fallback / build sin deploy). Para CD de un paso
# (build + deploy en una corrida) usá `make deploy V=X.Y.Z` → deploy/build/online-game-cicd.yaml
# (SDD 44). El helm upgrade manual de abajo queda como referencia (SDD 17).
# Adaptado del patrón de infra-ai (roles/install-leloir-image): un Workflow clona el repo
# (inputs.artifacts.git) y Kaniko builda desde deploy/Dockerfile, empujando al registry interno.
#
# Aplicar:   kubectl create -f deploy/build/online-game-kaniko.yaml
# Seguir:    kubectl logs -l app=online-game-build -n kaniko -f
# Esperar:   kubectl wait workflow -l app=online-game-build -n kaniko \
#              --for=jsonpath='{.status.phase}'=Succeeded --timeout=900s
#
# Cambiá el tag en --destination y luego: helm upgrade galaxy ... --set image.tag=<tag>
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: build-online-game-
  namespace: kaniko
  labels:
    app: online-game-build
spec:
  entrypoint: build-image
  ttlStrategy:
    secondsAfterSuccess: 3600      # borra el OBJETO Workflow 1h después de éxito
    secondsAfterFailure: 7200      # 2h: el status (qué paso falló) queda para debug; los pods/PVC se van ya (GC abajo)
  # LIMPIEZA (faltaba → quedaban pods Completed de DÍAS + PVCs colgados en el ns compartido `kaniko`, saturando el
  # controlador de Argo y rompiendo deploys de otros pipelines — incidente 2026-06-28). Borra pods Y el PVC `workspace`
  # apenas el workflow termina (éxito O fallo). Nada efímero queda en disco/API.
  podGC:
    strategy: OnWorkflowCompletion
  volumeClaimGC:
    strategy: OnWorkflowCompletion
  nodeSelector:
    kubernetes.io/hostname: srv-rk1-nvme-01    # arm64, como el nodo del juego
  tolerations:
    - key: "node.kubernetes.io/unreachable"
      operator: Exists
      effect: NoExecute
    - key: "node.kubernetes.io/not-ready"
      operator: Exists
      effect: NoExecute
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn-nvme
        resources:
          requests:
            storage: 5Gi
  templates:
    - name: build-image
      inputs:
        artifacts:
          - name: source
            path: /workspace/source
            git:
              repo: "https://github.com/villadalmine/online-game.git"
              revision: main
              depth: 1
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - "--dockerfile=/workspace/source/deploy/Dockerfile"
          - "--context=dir:///workspace/source"
          - "--destination=registry.registry:5000/online-game:1.157.0"
          - "--insecure"
          - "--skip-tls-verify"
          - "--snapshot-mode=redo"
          - "--compression=zstd"
          - "--compression-level=1"
        resources:
          # ephemeral-storage: Kaniko extrae las capas al disco efímero del NODO (no la PVC ni la DB).
          # Reservamos un piso (request) y ponemos techo (limit) para evitar evicción por presión de
          # disco del nodo (que mataba el build a mitad de camino). Ver pending-next-session.
          requests:
            cpu: "1"
            memory: "2Gi"
            ephemeral-storage: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
            ephemeral-storage: "8Gi"
        volumeMounts:
          - name: workspace
            mountPath: /workspace
