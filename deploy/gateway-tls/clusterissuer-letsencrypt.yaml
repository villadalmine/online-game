# ClusterIssuer de Let's Encrypt (ACME) para certs PÚBLICOS (browsers confían).
# El cluster ya tiene cert-manager con enableGatewayAPI:true.
#
# Solver: DNS-01 (recomendado). No necesita tráfico HTTP entrante (sirve detrás de NAT o si
# solo tenés el :443 forwardeado). (Si podés exponer el :80 al Gateway, alternativamente usá
# HTTP-01 con http01.gatewayHTTPRoute apuntando al Gateway; ver README.)
#
# Ejemplo abajo con acme-dns (solver BUILT-IN): ideal para proveedores SIN solver nativo en
# cert-manager (p.ej. registradores con API limitada). Delegás _acme-challenge.<dominio> con un
# CNAME estático a tu acme-dns y cert-manager escribe ahí los TXT dinámicos. Para proveedores
# con solver nativo (cloudflare/route53/azuredns/google) o webhooks, cambiá el bloque `solvers`.
# Empezá SIEMPRE con staging; cuando emita ok, pasá a prod.
#
# Secret con las credenciales de registro de acme-dns (NO lo commitees):
#   kubectl create secret generic acme-dns-creds -n cert-manager \
#     --from-file=acmedns.json=./acmedns-accounts.json
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: you@example.com                  # <- tu email (avisos de expiración)
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          acmeDNS:
            host: https://acme-dns.example   # tu instancia acme-dns
            accountSecretRef:
              name: acme-dns-creds
              key: acmedns.json
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: you@example.com                  # <- tu email
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          acmeDNS:
            host: https://acme-dns.example   # tu instancia acme-dns
            accountSecretRef:
              name: acme-dns-creds
              key: acmedns.json
