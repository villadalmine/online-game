# ClusterIssuer de Let's Encrypt (ACME) para certs PÚBLICOS (browsers confían).
# El cluster ya tiene cert-manager con enableGatewayAPI:true.
#
# Solver: DNS-01 (recomendado). No necesita tráfico HTTP entrante (sirve detrás de NAT o si
# solo tenés el :443 forwardeado). Requiere credenciales de tu proveedor de DNS en un Secret.
# (Si en cambio podés exponer el :80 al Gateway, podés usar HTTP-01 con un solver
#  http01.gatewayHTTPRoute apuntando al Gateway; ver README.)
#
# Ejemplo abajo con Cloudflare; ajustá al proveedor real (route53, acme-dns, rfc2136, etc.).
# Empezá SIEMPRE con staging; cuando emita ok, pasá a prod.
#
# Secret con el token (NO lo commitees):
#   kubectl create secret generic clouddns-token -n cert-manager \
#     --from-literal=api-token=<DNS_API_TOKEN>
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: you@example.com                  # <- tu email (avisos de expiración)
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: clouddns-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: you@example.com                  # <- tu email
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: clouddns-token
              key: api-token
