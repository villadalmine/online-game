# Listener HTTPS para tu dominio en el Gateway COMPARTIDO de Cilium.
# Reemplazá <DOMINIO> y los nombres del Gateway/Secret según tu cluster.
#
# Esto NO es un objeto nuevo: es el bloque a AGREGAR a los listeners del Gateway existente
# (es aditivo, no rompe a los demás tenants). Dos formas:
#
#   A) kubectl patch (recomendado, no toca el resto):
#      kubectl annotate gateway <GATEWAY> -n <GATEWAY_NS> \
#        cert-manager.io/cluster-issuer=letsencrypt-prod --overwrite
#      kubectl patch gateway <GATEWAY> -n <GATEWAY_NS> --type=json -p '[
#        {"op":"add","path":"/spec/listeners/-","value":{
#          "name":"app-https",
#          "hostname":"<DOMINIO>",
#          "port":443,"protocol":"HTTPS",
#          "allowedRoutes":{"namespaces":{"from":"All"}},
#          "tls":{"mode":"Terminate","certificateRefs":[
#            {"group":"","kind":"Secret","name":"app-tls","namespace":"<GATEWAY_NS>"}]}}}]'
#
#   B) Editando el Gateway a mano (kubectl edit gateway <GATEWAY> -n <GATEWAY_NS>):
#      - agregá la annotation `cert-manager.io/cluster-issuer: letsencrypt-prod` en metadata
#      - agregá este listener al array spec.listeners:
#
#        - name: app-https
#          hostname: <DOMINIO>
#          port: 443
#          protocol: HTTPS
#          allowedRoutes:
#            namespaces:
#              from: All
#          tls:
#            mode: Terminate
#            certificateRefs:
#              - group: ""
#                kind: Secret
#                name: app-tls               # cert-manager lo crea y rellena (no existe aún)
#                namespace: <GATEWAY_NS>
#
# Con la annotation + el listener, el "gateway shim" de cert-manager crea un Certificate
# automáticamente (dnsNames = la hostname del listener) y rellena el Secret `app-tls`.
# No hace falta crear el Certificate a mano.
#
# El HTTPRoute del chart (gateway.host=<DOMINIO>) liga por hostname a este listener.
