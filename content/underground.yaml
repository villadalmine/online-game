# SDD 64: habitaciones del búnker subterráneo. Data-driven (costos por rol, SDD 53). Cada sala mejora
# uno de los medidores (comida/agua/gente) o habilita defensa. `requires_tech` gatea por el árbol.
# food/water/people = aporte al regen del medidor correspondiente (0-100). vent = mitigación de gas.
rooms:
  - key: quarters
    icon: "🛏"
    name: "Viviendas"
    name_en: "Living quarters"
    requires_tech: bunker_engineering
    people: 8            # aloja/sostiene gente (regen de salud de gente)
    energy_cost: 10
    build_seconds: 180
    cost: { structural: 120, energetic: 40 }
  - key: farm
    icon: "🌱"
    name: "Cultivos"
    name_en: "Crops"
    requires_tech: bunker_engineering
    food: 10            # produce comida (regen de salud de comida)
    energy_cost: 12
    build_seconds: 200
    cost: { structural: 90, energetic: 60, advanced: 20 }
  - key: canteen
    icon: "🍲"
    name: "Comedor"
    name_en: "Canteen"
    requires_tech: bunker_engineering
    food: 6
    energy_cost: 8
    build_seconds: 150
    cost: { structural: 100, energetic: 30 }
  - key: water_reserve
    icon: "💧"
    name: "Reserva de agua"
    name_en: "Water reserve"
    requires_tech: bunker_engineering
    water: 12          # produce/almacena agua (regen de salud de agua)
    energy_cost: 10
    build_seconds: 190
    cost: { structural: 130, energetic: 40 }
  - key: research_room
    icon: "🔬"
    name: "Sala de investigación"
    name_en: "Research room"
    requires_tech: bunker_engineering
    electronics: 6      # SDD 64 v2: produce electrónica/h (moneda de repoblación)
    energy_cost: 20
    build_seconds: 260
    cost: { structural: 100, energetic: 180, advanced: 90 }
  - key: atomic_lab
    icon: "☢"
    name: "Laboratorio atómico"
    name_en: "Atomic lab"
    requires_tech: bunker_engineering
    electronics: 15     # SDD 64 v2: la electrónica de alto valor
    energy_cost: 40
    build_seconds: 400
    cost: { structural: 200, energetic: 400, advanced: 400 }
  - key: vault
    icon: "🗄"
    name: "Bóveda de materiales"
    name_en: "Materials vault"
    requires_tech: bunker_engineering
    vault_storage: 5000   # SDD 69: capacidad de acopio subterráneo (a salvo del saqueo)
    energy_cost: 15
    build_seconds: 240
    cost: { structural: 180, energetic: 40 }
  # SDD 75: terraformador — mientras esté activo agranda el búnker (+grid_bonus al lado de la grilla).
  - key: terraformer
    icon: "🌎"
    name: "Terraformador"
    name_en: "Terraformer"
    requires_tech: terraforming
    grid_bonus: 3        # SDD 75: agranda el lado de la grilla de este búnker mientras esté activo
    energy_cost: 60
    build_seconds: 600
    cost: { structural: 600, energetic: 300, advanced: 400 }
  # SDD 76: puerta cuántica — mientras esté activa, este búnker puede ENVIAR electrónica a otro búnker.
  - key: quantum_gate
    icon: "⚛"
    name: "Puerta cuántica"
    name_en: "Quantum gate"
    requires_tech: quantum_jump
    teleporter: true     # SDD 76: habilita el teletransporte de electrónica desde este búnker
    energy_cost: 80
    build_seconds: 700
    cost: { structural: 500, energetic: 700, advanced: 700 }
  # SDD 64 §3.5: defensas (requieren bunker_defense).
  - key: ventilation
    icon: "🌀"
    name: "Ventilación"
    name_en: "Ventilation"
    requires_tech: bunker_defense
    vent: 1            # cada una mitiga el gas tóxico (tope en config)
    energy_cost: 15
    build_seconds: 200
    cost: { structural: 160, advanced: 80 }
  - key: lockdown
    icon: "🔒"
    name: "Cerradura"
    name_en: "Lockdown"
    requires_tech: bunker_defense
    lock: 1            # sella las entradas: sin cerradura ACTIVA, cualquiera con intel se te mete
    energy_cost: 15
    build_seconds: 220
    cost: { structural: 200, advanced: 100 }
