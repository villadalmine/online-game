# Tecnologías investigables. Requieren un laboratorio activo. Al completarse otorgan un
# efecto permanente (multiplicador) que se aplica en los sistemas existentes:
#   effect: production | attack | defense  (apila sobre bonus de raza y boons de dioses)
# i18n: `name`/`description` son ES; `*_en` agregan inglés (SDD 4).
technologies:
  - key: mining_efficiency
    name: "Mineria mejorada"
    category: economy
    name_en: "Improved mining"
    description: "+25% de produccion de minas."
    description_en: "+25% mine production."
    requires: research_lab
    energy_cost: 20
    research_seconds: 300
    cost: { structural: 200, energetic: 150 }
    effect: production
    magnitude: 1.25
  - key: deep_core_mining
    name: "Mineria de nucleo profundo"
    category: economy
    name_en: "Deep core mining"
    description: "+25% de produccion adicional."
    description_en: "+25% additional production."
    requires: research_lab
    requires_tech: mining_efficiency
    energy_cost: 30
    research_seconds: 600
    cost: { structural: 350, energetic: 250, advanced: 100 }
    effect: production
    magnitude: 1.25
  - key: weapons
    name: "Armamento avanzado"
    category: military
    name_en: "Advanced weaponry"
    description: "+30% de ataque de tus flotas."
    description_en: "+30% attack for your fleets."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 250, energetic: 200, advanced: 80 }
    effect: attack
    magnitude: 1.30
  - key: shields
    name: "Escudos planetarios"
    category: military
    name_en: "Planetary shields"
    description: "+30% de defensa de tus bases."
    description_en: "+30% defense for your bases."
    requires: research_lab
    requires_tech: weapons
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 250, energetic: 150, advanced: 80 }
    effect: defense
    magnitude: 1.30
  - key: espionage
    name: "Redes de espionaje"
    category: espionage
    name_en: "Espionage networks"
    description: "+40% al poder de tus espías (intel más profunda, menos detección)."
    description_en: "+40% to your spies' power (deeper intel, less detection)."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 200, energetic: 180, advanced: 100 }
    effect: espionage
    magnitude: 1.40
  # Tecnologías de colonización (SDD 37): cada una vence un límite ambiental → permite colonizar
  # mundos antes imposibles. `effect: colonize` + `colonize: {axis, factor}` lo lee compat().
  - key: antigravity
    name: "Antigravedad"
    category: colonization
    name_en: "Antigravity"
    description: "Plataformas antigravedad: tolerás gravedades muy distintas a tu mundo."
    description_en: "Antigravity platforms: tolerate gravities far from your homeworld."
    requires: research_lab
    energy_cost: 40
    research_seconds: 900
    cost: { structural: 400, energetic: 300, advanced: 250 }
    effect: colonize
    colonize: { axis: gravity, factor: 3.0 }
    magnitude: 1.0
  - key: thermal_shielding
    name: "Blindaje térmico"
    category: colonization
    name_en: "Thermal shielding"
    description: "Cúpulas con regulación térmica: aguantás frío o calor extremos."
    description_en: "Thermally-regulated domes: endure extreme cold or heat."
    requires: research_lab
    energy_cost: 40
    research_seconds: 900
    cost: { structural: 350, energetic: 350, advanced: 200 }
    effect: colonize
    colonize: { axis: temp, factor: 4.0 }
    magnitude: 1.0
  - key: sealed_domes
    name: "Cúpulas selladas"
    category: colonization
    name_en: "Sealed domes"
    description: "Hábitats presurizados con escudo: colonizás sin atmósfera respirable."
    description_en: "Pressurized shielded habitats: colonize without breathable air."
    requires: research_lab
    requires_tech: thermal_shielding
    energy_cost: 50
    research_seconds: 1200
    cost: { structural: 500, energetic: 300, advanced: 350 }
    effect: colonize
    colonize: { axis: atmosphere, factor: 1.0 }
    magnitude: 1.0
  - key: orbital_robotics
    name: "Robótica orbital"
    category: colonization
    name_en: "Orbital robotics"
    description: "Estaciones orbitales con robots: extraen recursos de mundos letales (nadie vive ahí; naves van y vienen). Rinde menos, cuesta más, pero abre cualquier mundo."
    description_en: "Orbital stations with robots: extract resources from lethal worlds (no one lives there; ships ferry). Lower yield, higher cost, but opens any world."
    requires: research_lab
    requires_tech: antigravity
    energy_cost: 60
    research_seconds: 1500
    cost: { structural: 600, energetic: 400, advanced: 450 }
    effect: colonize
    colonize: { axis: orbital }
    magnitude: 1.0
  - key: counter_espionage
    name: "Contraespionaje"
    category: espionage
    name_en: "Counter-espionage"
    description: "+40% a tu defensa de espionaje (ofusca tu info y detecta intrusos)."
    description_en: "+40% to your espionage defense (obfuscates your info, detects intruders)."
    requires: research_lab
    requires_tech: espionage
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 220, energetic: 160, advanced: 100 }
    effect: counter_espionage
    magnitude: 1.40

  # --- Lanzadera de misiles (SDD 49): árbol GATE (no dan multiplicador). Habilitan el edificio
  # `launcher` y, en cadena, cada tipo de misil (sónico → transatlántico → nuclear). ---
  - key: rocketry
    name: "Cohetería"
    category: strike
    name_en: "Rocketry"
    description: "Habilita la lanzadera de misiles y el misil sónico (intra-planeta)."
    description_en: "Unlocks the missile launcher and the sonic missile (intra-planet)."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 220, energetic: 180, advanced: 60 }
    magnitude: 1.0
  - key: ballistics
    name: "Balística"
    category: strike
    name_en: "Ballistics"
    description: "Habilita el misil transatlántico (más daño, más difícil de interceptar)."
    description_en: "Unlocks the cruise missile (more damage, harder to intercept)."
    requires: research_lab
    requires_tech: rocketry
    energy_cost: 35
    research_seconds: 720
    cost: { structural: 340, energetic: 260, advanced: 140 }
    magnitude: 1.0
  - key: nuclear_fission
    name: "Fisión nuclear"
    category: strike
    name_en: "Nuclear fission"
    description: "Habilita el misil nuclear: daño masivo y de área, casi imposible de interceptar."
    description_en: "Unlocks the nuclear missile: massive area damage, nearly impossible to intercept."
    requires: research_lab
    requires_tech: ballistics
    energy_cost: 60
    research_seconds: 1500
    cost: { structural: 600, energetic: 450, advanced: 400 }
    magnitude: 1.0

  # --- Drones intra-planeta (SDD 50): árbol GATE. Habilitan la fábrica de drones, drones espía
  # más durables y los drones de ataque. ---
  - key: dronework
    name: "Dronística"
    category: drones
    name_en: "Dronework"
    description: "Habilita la fábrica de drones y el dron de reconocimiento liviano."
    description_en: "Unlocks the drone factory and the light recon drone."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 200, energetic: 180, advanced: 80 }
    magnitude: 1.0
  - key: drone_endurance
    name: "Autonomía de drones"
    category: drones
    name_en: "Drone endurance"
    description: "Habilita drones espía medio y pesado (más durables, más intel)."
    description_en: "Unlocks mid and heavy recon drones (more durable, more intel)."
    requires: research_lab
    requires_tech: dronework
    energy_cost: 35
    research_seconds: 720
    cost: { structural: 320, energetic: 280, advanced: 160 }
    magnitude: 1.0
  - key: attack_drones
    name: "Drones de ataque"
    category: drones
    name_en: "Attack drones"
    description: "Habilita el dron de ataque masivo (oleada sostenida sobre una base del planeta)."
    description_en: "Unlocks the mass attack drone (sustained wave on a base of the planet)."
    requires: research_lab
    requires_tech: dronework
    energy_cost: 40
    research_seconds: 900
    cost: { structural: 360, energetic: 300, advanced: 200 }
    magnitude: 1.0
