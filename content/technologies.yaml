# Tecnologías investigables. Requieren un laboratorio activo. Al completarse otorgan un
# efecto permanente (multiplicador) que se aplica en los sistemas existentes:
#   effect: production | attack | defense  (apila sobre bonus de raza y boons de dioses)
# i18n: `name`/`description` son ES; `*_en` agregan inglés (SDD 4).
technologies:
  - key: mining_efficiency
    name: "Mineria mejorada"
    category: economy
    name_en: "Improved mining"
    description: "+25% de produccion de minas."
    description_en: "+25% mine production."
    requires: research_lab
    energy_cost: 20
    research_seconds: 300
    cost: { structural: 200, energetic: 150 }
    effect: production
    magnitude: 1.25
  - key: deep_core_mining
    name: "Mineria de nucleo profundo"
    category: economy
    name_en: "Deep core mining"
    description: "+25% de produccion adicional."
    description_en: "+25% additional production."
    requires: research_lab
    requires_tech: mining_efficiency
    energy_cost: 30
    research_seconds: 600
    cost: { structural: 350, energetic: 250, advanced: 100 }
    effect: production
    magnitude: 1.25
  - key: weapons
    name: "Armamento avanzado"
    category: military
    name_en: "Advanced weaponry"
    description: "+30% de ataque de tus flotas."
    description_en: "+30% attack for your fleets."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 250, energetic: 200, advanced: 80 }
    effect: attack
    magnitude: 1.30
  - key: shields
    name: "Escudos planetarios"
    category: military
    name_en: "Planetary shields"
    description: "+30% de defensa de tus bases."
    description_en: "+30% defense for your bases."
    requires: research_lab
    requires_tech: weapons
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 250, energetic: 150, advanced: 80 }
    effect: defense
    magnitude: 1.30
  - key: espionage
    name: "Redes de espionaje"
    category: espionage
    name_en: "Espionage networks"
    description: "+40% al poder de tus espías (intel más profunda, menos detección)."
    description_en: "+40% to your spies' power (deeper intel, less detection)."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 200, energetic: 180, advanced: 100 }
    effect: espionage
    magnitude: 1.40
  # Tecnologías de colonización (SDD 37): cada una vence un límite ambiental → permite colonizar
  # mundos antes imposibles. `effect: colonize` + `colonize: {axis, factor}` lo lee compat().
  - key: antigravity
    name: "Antigravedad"
    category: colonization
    name_en: "Antigravity"
    description: "Plataformas antigravedad: tolerás gravedades muy distintas a tu mundo."
    description_en: "Antigravity platforms: tolerate gravities far from your homeworld."
    requires: research_lab
    energy_cost: 40
    research_seconds: 900
    cost: { structural: 400, energetic: 300, advanced: 250 }
    effect: colonize
    colonize: { axis: gravity, factor: 3.0 }
    magnitude: 1.0
  - key: thermal_shielding
    name: "Blindaje térmico"
    category: colonization
    name_en: "Thermal shielding"
    description: "Cúpulas con regulación térmica: aguantás frío o calor extremos."
    description_en: "Thermally-regulated domes: endure extreme cold or heat."
    requires: research_lab
    energy_cost: 40
    research_seconds: 900
    cost: { structural: 350, energetic: 350, advanced: 200 }
    effect: colonize
    colonize: { axis: temp, factor: 4.0 }
    magnitude: 1.0
  - key: sealed_domes
    name: "Cúpulas selladas"
    category: colonization
    name_en: "Sealed domes"
    description: "Hábitats presurizados con escudo: colonizás sin atmósfera respirable."
    description_en: "Pressurized shielded habitats: colonize without breathable air."
    requires: research_lab
    requires_tech: thermal_shielding
    energy_cost: 50
    research_seconds: 1200
    cost: { structural: 500, energetic: 300, advanced: 350 }
    effect: colonize
    colonize: { axis: atmosphere, factor: 1.0 }
    magnitude: 1.0
  - key: orbital_robotics
    name: "Robótica orbital"
    category: colonization
    name_en: "Orbital robotics"
    description: "Estaciones orbitales con robots: extraen recursos de mundos letales (nadie vive ahí; naves van y vienen). Rinde menos, cuesta más, pero abre cualquier mundo."
    description_en: "Orbital stations with robots: extract resources from lethal worlds (no one lives there; ships ferry). Lower yield, higher cost, but opens any world."
    requires: research_lab
    requires_tech: antigravity
    energy_cost: 60
    research_seconds: 1500
    cost: { structural: 600, energetic: 400, advanced: 450 }
    effect: colonize
    colonize: { axis: orbital }
    magnitude: 1.0
  - key: counter_espionage
    name: "Contraespionaje"
    category: espionage
    name_en: "Counter-espionage"
    description: "+40% a tu defensa de espionaje (ofusca tu info y detecta intrusos)."
    description_en: "+40% to your espionage defense (obfuscates your info, detects intruders)."
    requires: research_lab
    requires_tech: espionage
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 220, energetic: 160, advanced: 100 }
    effect: counter_espionage
    magnitude: 1.40

  # --- Lanzadera de misiles (SDD 49): árbol GATE (no dan multiplicador). Habilitan el edificio
  # `launcher` y, en cadena, cada tipo de misil (sónico → transatlántico → nuclear). ---
  - key: rocketry
    name: "Cohetería"
    category: strike
    name_en: "Rocketry"
    description: "Habilita la lanzadera de misiles y el misil sónico (intra-planeta)."
    description_en: "Unlocks the missile launcher and the sonic missile (intra-planet)."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 220, energetic: 180, advanced: 60 }
    magnitude: 1.0
  - key: ballistics
    name: "Balística"
    category: strike
    name_en: "Ballistics"
    description: "Habilita el misil transatlántico (más daño, más difícil de interceptar)."
    description_en: "Unlocks the cruise missile (more damage, harder to intercept)."
    requires: research_lab
    requires_tech: rocketry
    energy_cost: 35
    research_seconds: 720
    cost: { structural: 340, energetic: 260, advanced: 140 }
    magnitude: 1.0
  - key: nuclear_fission
    name: "Fisión nuclear"
    category: strike
    name_en: "Nuclear fission"
    description: "Habilita el misil nuclear: daño masivo y de área, casi imposible de interceptar."
    description_en: "Unlocks the nuclear missile: massive area damage, nearly impossible to intercept."
    requires: research_lab
    requires_tech: ballistics
    energy_cost: 60
    research_seconds: 1500
    cost: { structural: 600, energetic: 450, advanced: 400 }
    magnitude: 1.0

  # --- Drones intra-planeta (SDD 50): árbol GATE. Habilitan la fábrica de drones, drones espía
  # más durables y los drones de ataque. ---
  - key: dronework
    name: "Dronística"
    category: drones
    name_en: "Dronework"
    description: "Habilita la fábrica de drones y el dron de reconocimiento liviano."
    description_en: "Unlocks the drone factory and the light recon drone."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 200, energetic: 180, advanced: 80 }
    magnitude: 1.0
  - key: drone_endurance
    name: "Autonomía de drones"
    category: drones
    name_en: "Drone endurance"
    description: "Habilita drones espía medio y pesado (más durables, más intel)."
    description_en: "Unlocks mid and heavy recon drones (more durable, more intel)."
    requires: research_lab
    requires_tech: dronework
    energy_cost: 35
    research_seconds: 720
    cost: { structural: 320, energetic: 280, advanced: 160 }
    magnitude: 1.0
  - key: attack_drones
    name: "Drones de ataque"
    category: drones
    name_en: "Attack drones"
    description: "Habilita el dron de ataque masivo (oleada sostenida sobre una base del planeta)."
    description_en: "Unlocks the mass attack drone (sustained wave on a base of the planet)."
    requires: research_lab
    requires_tech: dronework
    energy_cost: 40
    research_seconds: 900
    cost: { structural: 360, energetic: 300, advanced: 200 }
    magnitude: 1.0

  # --- Viajes por el hiperespacio (SDD 57): árbol GATE de fin de juego. Velocidad de la luz →
  # hiperespacio → habilita el ACORAZADO (nave capital "rompe-bases"). Costos energetic+advanced
  # dominantes (SDD 53: fin de juego/progreso, no defensa). ---
  - key: relativistic_drive
    name: "Propulsión relativista"
    category: hyperspace
    name_en: "Relativistic drive"
    description: "Velocidad de la luz: motores relativistas, la base para viajar por el hiperespacio."
    description_en: "Light speed: relativistic engines, the basis for hyperspace travel."
    requires: research_lab
    requires_tech: antigravity
    energy_cost: 60
    research_seconds: 1500
    cost: { structural: 300, energetic: 600, advanced: 500 }
    magnitude: 1.0
  - key: hyperspace_travel
    name: "Viajes por el hiperespacio"
    category: hyperspace
    name_en: "Hyperspace travel"
    description: "Saltos por el hiperespacio: habilita el acorazado, una nave de guerra que arrasa bases."
    description_en: "Hyperspace jumps: unlocks the dreadnought, a warship that razes bases."
    requires: research_lab
    requires_tech: relativistic_drive
    energy_cost: 90
    research_seconds: 2400
    cost: { structural: 500, energetic: 900, advanced: 800 }
    magnitude: 1.0
  # SDD 61: satélites — tecnología satelital, señales avanzadas (inhibidores) y blindaje (grados).
  - key: satellite_tech
    name: "Tecnología satelital"
    category: orbital
    name_en: "Satellite technology"
    description: "Pone satélites en órbita: recon de tu planeta y espía que mapea al enemigo."
    description_en: "Puts satellites in orbit: recon of your planet and spies that map the enemy."
    requires: research_lab
    requires_tech: antigravity
    energy_cost: 70
    research_seconds: 1800
    cost: { structural: 300, energetic: 500, advanced: 450 }
    magnitude: 1.0
  - key: advanced_signals
    name: "Señales avanzadas"
    category: espionage
    name_en: "Advanced signals"
    description: "Guerra electrónica: habilita el inhibidor de señal que protege tus bases del mapeo."
    description_en: "Electronic warfare: unlocks the signal inhibitor that shields your bases from mapping."
    requires: research_lab
    requires_tech: counter_espionage
    energy_cost: 40
    research_seconds: 900
    cost: { structural: 260, energetic: 200, advanced: 140 }
    magnitude: 1.0
  - key: sat_shield_mk1
    name: "Blindaje de satélites I"
    category: orbital
    name_en: "Satellite shielding I"
    description: "Coraza ligera: tus satélites resisten mejor los disparos de drones (gastan más energía)."
    description_en: "Light armor: your satellites resist drone fire better (drain more energy)."
    requires: research_lab
    requires_tech: satellite_tech
    energy_cost: 50
    research_seconds: 1200
    cost: { structural: 200, energetic: 400, advanced: 300 }
    magnitude: 1.0
  - key: sat_shield_mk2
    name: "Blindaje de satélites II"
    category: orbital
    name_en: "Satellite shielding II"
    description: "Aleaciones reforzadas: más resistencia a drones, vida útil algo menor."
    description_en: "Reinforced alloys: more drone resistance, slightly shorter lifetime."
    requires: research_lab
    requires_tech: sat_shield_mk1
    energy_cost: 60
    research_seconds: 1600
    cost: { structural: 250, energetic: 550, advanced: 450 }
    magnitude: 1.0
  - key: sat_shield_mk3
    name: "Blindaje de satélites III"
    category: orbital
    name_en: "Satellite shielding III"
    description: "Coraza de fin de juego: casi inmune a drones, pero la energía cae rápido al orbitar."
    description_en: "Endgame armor: nearly drone-immune, but energy drops fast in orbit."
    requires: research_lab
    requires_tech: sat_shield_mk2
    energy_cost: 80
    research_seconds: 2200
    cost: { structural: 300, energetic: 750, advanced: 650 }
    magnitude: 1.0
  # SDD 67: diplomacia — requiere el edificio de gobierno; habilita el tributo ante un nuclear.
  - key: diplomacy
    name: "Diplomacia"
    category: politics
    name_en: "Diplomacy"
    description: "Política exterior: ante un misil nuclear entrante podés ofrecer tributo para que lo cancelen."
    description_en: "Foreign policy: when a nuclear missile is inbound you can offer tribute to cancel it."
    requires: government
    energy_cost: 45
    research_seconds: 1100
    cost: { structural: 240, energetic: 180, advanced: 120 }
    magnitude: 1.0
  # SDD 64: búnkeres atómicos — cavar túneles + habitaciones subterráneas; defensa (cerradura/ventilación).
  - key: bunker_engineering
    name: "Ingeniería de búnkeres"
    category: underground
    name_en: "Bunker engineering"
    description: "Cavá túneles atómicos: se abre un mapa subterráneo donde construís habitaciones."
    description_en: "Dig atomic tunnels: opens an underground map where you build rooms."
    requires: research_lab
    requires_tech: nuclear_fission
    energy_cost: 70
    research_seconds: 1600
    cost: { structural: 500, energetic: 300, advanced: 250 }
    magnitude: 1.0
  - key: bunker_defense
    name: "Defensa de búnkeres"
    category: underground
    name_en: "Bunker defense"
    description: "Cerraduras (sellan entradas) y ventilación (mitiga el gas tóxico) para tu búnker."
    description_en: "Lockdown (seals entrances) and ventilation (mitigates toxic gas) for your bunker."
    requires: research_lab
    requires_tech: bunker_engineering
    energy_cost: 50
    research_seconds: 1200
    cost: { structural: 400, energetic: 200, advanced: 200 }
    magnitude: 1.0
  - key: artificial_life
    name: "Vida artificial"
    category: underground
    name_en: "Artificial life"
    description: "Cría IA con robots autónomos en el búnker; después subís sus niveles de inteligencia."
    description_en: "Grow AI with autonomous robots in the bunker; then level up its intelligence."
    requires: research_lab
    requires_tech: bunker_engineering
    energy_cost: 90
    research_seconds: 2200
    cost: { structural: 400, energetic: 500, advanced: 600 }
    magnitude: 1.0
  - key: underground_construction
    name: "Construcción subterránea"
    category: underground
    name_en: "Underground construction"
    description: "Excavá más hondo para agrandar tu búnker cuando te quedás sin espacio."
    description_en: "Dig deeper to expand your bunker when you run out of space."
    requires: research_lab
    requires_tech: bunker_engineering
    energy_cost: 60
    research_seconds: 1400
    cost: { structural: 450, energetic: 250, advanced: 200 }
    magnitude: 1.0
  # SDD 75: terraformación — habilita la sala "terraformador" que agranda mucho el búnker de una.
  - key: terraforming
    name: "Terraformación"
    category: underground
    name_en: "Terraforming"
    description: "Remodelás la roca madre: habilita el Terraformador, que agranda el búnker de golpe."
    description_en: "Reshape the bedrock: unlocks the Terraformer, which enlarges the bunker at once."
    requires: research_lab
    requires_tech: underground_construction
    energy_cost: 120
    research_seconds: 2600
    cost: { structural: 700, energetic: 400, advanced: 500 }
    magnitude: 1.0
  # SDD 63: salto espacial — capstone del árbol endgame (requiere TODO). Habilita la nave "jumper".
  - key: space_jump
    name: "Salto espacial"
    category: hyperspace
    name_en: "Space jump"
    description: "Puente de Einstein-Rosen: naves saltadoras que mueven tropas entre tus bases al instante."
    description_en: "Einstein-Rosen bridge: jumper ships that move troops between your bases instantly."
    requires: research_lab
    requires_tech: hyperspace_travel
    requires_techs: [satellite_tech, nuclear_fission, attack_drones, orbital_robotics]
    energy_cost: 120
    research_seconds: 3600
    cost: { structural: 600, energetic: 1400, advanced: 1200 }
    magnitude: 1.0
