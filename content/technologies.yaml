# Tecnologías investigables. Requieren un laboratorio activo. Al completarse otorgan un
# efecto permanente (multiplicador) que se aplica en los sistemas existentes:
#   effect: production | attack | defense  (apila sobre bonus de raza y boons de dioses)
# i18n: `name`/`description` son ES; `*_en` agregan inglés (SDD 4).
technologies:
  - key: mining_efficiency
    name: "Mineria mejorada"
    name_en: "Improved mining"
    description: "+25% de produccion de minas."
    description_en: "+25% mine production."
    requires: research_lab
    energy_cost: 20
    research_seconds: 300
    cost: { structural: 200, energetic: 150 }
    effect: production
    magnitude: 1.25
  - key: deep_core_mining
    name: "Mineria de nucleo profundo"
    name_en: "Deep core mining"
    description: "+25% de produccion adicional."
    description_en: "+25% additional production."
    requires: research_lab
    energy_cost: 30
    research_seconds: 600
    cost: { structural: 350, energetic: 250, advanced: 100 }
    effect: production
    magnitude: 1.25
  - key: weapons
    name: "Armamento avanzado"
    name_en: "Advanced weaponry"
    description: "+30% de ataque de tus flotas."
    description_en: "+30% attack for your fleets."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 250, energetic: 200, advanced: 80 }
    effect: attack
    magnitude: 1.30
  - key: shields
    name: "Escudos planetarios"
    name_en: "Planetary shields"
    description: "+30% de defensa de tus bases."
    description_en: "+30% defense for your bases."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 250, energetic: 150, advanced: 80 }
    effect: defense
    magnitude: 1.30
  - key: espionage
    name: "Redes de espionaje"
    name_en: "Espionage networks"
    description: "+40% al poder de tus espías (intel más profunda, menos detección)."
    description_en: "+40% to your spies' power (deeper intel, less detection)."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 200, energetic: 180, advanced: 100 }
    effect: espionage
    magnitude: 1.40
  # Tecnologías de colonización (SDD 37): cada una vence un límite ambiental → permite colonizar
  # mundos antes imposibles. `effect: colonize` + `colonize: {axis, factor}` lo lee compat().
  - key: antigravity
    name: "Antigravedad"
    name_en: "Antigravity"
    description: "Plataformas antigravedad: tolerás gravedades muy distintas a tu mundo."
    description_en: "Antigravity platforms: tolerate gravities far from your homeworld."
    requires: research_lab
    energy_cost: 40
    research_seconds: 900
    cost: { structural: 400, energetic: 300, advanced: 250 }
    effect: colonize
    colonize: { axis: gravity, factor: 3.0 }
    magnitude: 1.0
  - key: thermal_shielding
    name: "Blindaje térmico"
    name_en: "Thermal shielding"
    description: "Cúpulas con regulación térmica: aguantás frío o calor extremos."
    description_en: "Thermally-regulated domes: endure extreme cold or heat."
    requires: research_lab
    energy_cost: 40
    research_seconds: 900
    cost: { structural: 350, energetic: 350, advanced: 200 }
    effect: colonize
    colonize: { axis: temp, factor: 4.0 }
    magnitude: 1.0
  - key: sealed_domes
    name: "Cúpulas selladas"
    name_en: "Sealed domes"
    description: "Hábitats presurizados con escudo: colonizás sin atmósfera respirable."
    description_en: "Pressurized shielded habitats: colonize without breathable air."
    requires: research_lab
    energy_cost: 50
    research_seconds: 1200
    cost: { structural: 500, energetic: 300, advanced: 350 }
    effect: colonize
    colonize: { axis: atmosphere, factor: 1.0 }
    magnitude: 1.0
  - key: counter_espionage
    name: "Contraespionaje"
    name_en: "Counter-espionage"
    description: "+40% a tu defensa de espionaje (ofusca tu info y detecta intrusos)."
    description_en: "+40% to your espionage defense (obfuscates your info, detects intruders)."
    requires: research_lab
    energy_cost: 25
    research_seconds: 480
    cost: { structural: 220, energetic: 160, advanced: 100 }
    effect: counter_espionage
    magnitude: 1.40
