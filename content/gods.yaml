# Gods live on moons and grant boons + premium resources via expeditions.
# expedition: costo/tiempo/requisito. grants: recursos entregados al volver.
# boon: buff temporal que se aplica en los sistemas existentes
#   (effect: production | attack | defense). magnitude multiplica; duration en segundos.
# i18n: `name` es ES; `name_en` agrega inglés. `god` es nombre propio (no se traduce).
# SDD 89: `catalyst` = el mineral EXÓTICO único de esta luna (se entrega en grants). Juntar el set
# completo de tu galaxia habilita el Domo de terraformación (colonizar mundos letales).
moons:
  - key: luna
    name: "Luna"
    icon: "🌕"
    name_en: "The Moon"
    planet: earth
    god: "Selene"
    catalyst: selenite
    expedition:
      energy_cost: 30
      duration_seconds: 600
      requires_unit: shuttle
    grants:
      helium3: 100
      rare_earth: 50
      selenite: 4
    boon:
      effect: production
      magnitude: 1.25
      duration_seconds: 3600
