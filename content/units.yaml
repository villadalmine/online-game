# Units catalog. Costs use resource ROLES (resolved per-race), like buildings.
# personnel = population roles; heavy = race-specific war machines.
# requires = building (key) that must be ACTIVE in the base to train this unit.
# i18n: `name`/`description` are ES; `*_en` add English (SDD 4).
personnel:
  - key: worker
    icon: "👷"
    name: "Trabajador"
    name_en: "Worker"
    real: "Obrero/operario: mano de obra industrial."
    real_en: "Worker/operator: industrial labour."
    sources: ["Wikipedia: Manual labour"]
    description: "Aumenta produccion y construccion."
    description_en: "Boosts production and construction."
    requires: headquarters
    domain: personnel       # SDD 46: se aloja en base central / laboratorio
    housing_size: 1
    mining_power: 1         # SDD 47: cuánto rinde un obrero al operar minas (staffing)
    energy_cost: 2
    train_seconds: 30
    cost: { structural: 10, energetic: 5 }
    stats: { attack: 0, defense: 1, hp: 5 }
  - key: soldier
    icon: "💂"
    name: "Militar"
    name_en: "Soldier"
    real: "Infantería: soldado de combate terrestre."
    real_en: "Infantry: ground combat soldier."
    sources: ["Wikipedia: Infantry"]
    description: "Unidad de combate basica. Barata e inmediata: para ataques rapidos desde el inicio."
    description_en: "Basic combat unit. Cheap and immediate: for quick early attacks."
    requires: headquarters
    domain: infantry        # SDD 46: se aloja en el cuartel
    housing_size: 1
    energy_cost: 3
    train_seconds: 45
    # SDD 53: infantería = SOLO rol structural → siempre podés defenderte con tu mineral base,
    # aunque te quedes sin el energético/avanzado. Soldier solo requiere headquarters (sin tech).
    cost: { structural: 22 }
    stats: { attack: 8, defense: 5, hp: 12 }
  - key: scientist
    icon: "🔬"
    name: "Cientifico"
    name_en: "Scientist"
    real: "Investigador científico: I+D y experimentación."
    real_en: "Research scientist: R&D and experimentation."
    sources: ["Wikipedia: Scientist"]
    description: "Acelera investigacion."
    description_en: "Speeds up research."
    requires: research_lab
    domain: personnel       # SDD 46: personal civil (base central / laboratorio)
    housing_size: 1
    energy_cost: 3
    train_seconds: 45
    # SDD 53: ciencia = rol energetic + advanced (el "cuello" del energético vive en el progreso,
    # NO en la defensa). Sin energético/avanzado igual defendés con infantería (structural).
    cost: { energetic: 22, advanced: 13 }
    stats: { attack: 0, defense: 2, hp: 6 }

  - key: spy
    icon: "🕵"
    name: "Espía"
    name_en: "Spy"
    description: "Recopila inteligencia de un objetivo; tambien defiende del espionaje enemigo."
    description_en: "Gathers intel on a target; also defends against enemy espionage."
    real: "Inteligencia / reconocimiento (HUMINT/ISR)."
    real_en: "Intelligence / reconnaissance (HUMINT/ISR)."
    sources: ["Wikipedia: Espionage"]
    requires: research_lab
    requires_tech: espionage
    domain: personnel       # SDD 46: personal civil (base central / laboratorio)
    housing_size: 1
    energy_cost: 4
    train_seconds: 40
    cost: { structural: 12, energetic: 8, advanced: 6 }
    stats: { attack: 1, defense: 2, hp: 8, spy: 10 }

heavy:
  - key: tank
    icon: "🛡"
    name: "Tanque"
    name_en: "Tank"
    real: "Carro de combate: vehículo blindado con orugas."
    real_en: "Tank: tracked armored fighting vehicle."
    sources: ["Wikipedia: Tank"]
    requires: factory
    requires_tech: weapons
    domain: ground          # SDD 46: pesada terrestre, se aloja en la fábrica
    housing_size: 2
    energy_cost: 8
    train_seconds: 120
    # SDD 53: ground (blindado pesado) = structural + advanced (sin energetic).
    cost: { structural: 90, advanced: 50 }
    stats: { attack: 30, defense: 25, hp: 60 }
  - key: ship
    icon: "🚢"
    name: "Barco"
    name_en: "Ship"
    real: "Buque de guerra: nave naval de combate."
    real_en: "Warship: naval combat vessel."
    sources: ["Wikipedia: Warship"]
    requires: factory
    # barco = camino dinámico de ataque (lento pero accesible): fábrica, sin tech de armas.
    # Rigor científico (SDD 13): un barco necesita un océano → solo en planetas con agua líquida.
    requires_liquid_water: true
    propulsion: naval
    domain: naval           # SDD 46: se aloja en el puerto
    housing_size: 2
    energy_cost: 9
    train_seconds: 140
    cost: { structural: 100, energetic: 50 }
    stats: { attack: 25, defense: 30, hp: 80 }
  - key: aircraft
    icon: "✈"
    name: "Avion"
    name_en: "Aircraft"
    real: "Aeronave militar: avión de combate."
    real_en: "Military aircraft: combat airplane."
    sources: ["Wikipedia: Military aircraft"]
    requires: factory
    requires_tech: weapons
    # Rigor científico (SDD 13): un avión necesita atmósfera para volar → no en el vacío.
    requires_atmosphere: true
    propulsion: jet
    domain: air             # SDD 46: se aloja en el hangar
    housing_size: 2
    energy_cost: 10
    train_seconds: 150
    # SDD 53: air = energetic + advanced (sin structural) → el avión SÍ necesita el energético.
    cost: { energetic: 90, advanced: 70 }
    stats: { attack: 40, defense: 15, hp: 40 }
  - key: shuttle
    icon: "🚀"
    name: "Transbordador espacial"
    name_en: "Space shuttle"
    real: "Transbordador espacial: lanzadera reutilizable a órbita."
    real_en: "Space shuttle: reusable orbital spacecraft."
    sources: ["NASA: Space Shuttle"]
    requires: factory
    requires_tech: antigravity
    domain: space           # SDD 46: se aloja en el hangar
    housing_size: 3
    energy_cost: 15
    train_seconds: 240
    # SDD 53: space = energetic + advanced (alto) → unidad espacial de fin de juego.
    cost: { energetic: 180, advanced: 120 }
    stats: { attack: 20, defense: 20, hp: 100 }
  - key: cargo_ship
    icon: "🛰"
    name: "Nave de carga"
    name_en: "Cargo ship"
    real: "Carguero espacial: transporta minerales entre planetas."
    real_en: "Space freighter: hauls minerals between planets."
    sources: ["Wikipedia: Cargo spacecraft"]
    requires: factory
    domain: space           # SDD 46: se aloja en el hangar
    housing_size: 3
    energy_cost: 18
    train_seconds: 200
    cost: { structural: 150, energetic: 90, advanced: 40 }
    # cargo = capacidad de minerales por nave (SDD 42 Fase 2)
    stats: { attack: 5, defense: 10, hp: 90, cargo: 500 }

# Misiles (SDD 49): munición intra-planeta. domain `ordnance` (se aloja en la lanzadera). Se
# fabrican como una unidad más y se DISPARAN con POST /combat/strike (no van en una flota).
# `power` = daño al impactar; `intercept_cost` = cuánta capacidad antimisil cuesta derribarlo.
ordnance:
  - key: sonic_missile
    icon: "🚀"
    name: "Misil sónico"
    name_en: "Sonic missile"
    real: "Misil de corto alcance: golpe directo, barato, fácil de interceptar (en enjambre satura)."
    real_en: "Short-range missile: direct hit, cheap, easy to intercept (swarms saturate)."
    sources: ["Wikipedia: Missile"]
    requires: launcher
    requires_tech: rocketry
    domain: ordnance
    housing_size: 1
    range: intra_planet
    power: 60
    intercept_cost: 2     # SDD 49 balance: 1 torreta (10) frena 5 sónicos
    propulsion: rocket
    energy_cost: 6
    train_seconds: 30
    cost: { structural: 40, energetic: 30 }
  - key: cruise_missile
    icon: "🛩"
    name: "Misil transatlántico"
    name_en: "Cruise missile"
    real: "Misil de crucero: mayor alcance y daño, más difícil de interceptar."
    real_en: "Cruise missile: longer range and damage, harder to intercept."
    sources: ["Wikipedia: Cruise missile"]
    requires: launcher
    requires_tech: ballistics
    domain: ordnance
    housing_size: 2
    range: intra_planet
    power: 160
    intercept_cost: 6     # SDD 49 balance: 1 torreta frena ~1.6 transatlánticos
    propulsion: rocket
    energy_cost: 12
    train_seconds: 60
    cost: { structural: 120, energetic: 80, advanced: 40 }
  - key: nuclear_missile
    icon: "☢"
    name: "Misil nuclear"
    name_en: "Nuclear missile"
    real: "Misil balístico nuclear: daño masivo y de área; casi imposible de interceptar."
    real_en: "Nuclear ballistic missile: massive area damage; nearly impossible to intercept."
    sources: ["Wikipedia: Nuclear weapon"]
    requires: launcher
    requires_tech: nuclear_fission
    domain: ordnance
    housing_size: 4
    range: intra_planet
    power: 600
    intercept_cost: 30    # SDD 49 balance: hacen falta 3 torretas para 1 nuclear
    area: true            # SDD 49: además de la defensa, daña edificios no defensivos + fallout
    propulsion: rocket
    energy_cost: 30
    train_seconds: 180
    cost: { structural: 400, energetic: 250, advanced: 300 }

# Drones (SDD 50): intra-planeta. domain `drone` (se alojan en la fábrica de drones). Orbitan un
# objetivo: drenan TU energía (energy_per_tick) y caen ante las torretas (hp vs antiair). Los espía
# dan intel en vivo (intel_quality); los de ataque castigan la base (attack) por tick.
drone:
  - key: recon_drone
    icon: "🛸"
    name: "Dron de reconocimiento"
    name_en: "Recon drone"
    real: "UAV de reconocimiento liviano: barato, poca autonomía, intel básica en vivo."
    real_en: "Light recon UAV: cheap, low endurance, basic live intel."
    sources: ["Wikipedia: Unmanned aerial vehicle"]
    requires: drone_factory
    requires_tech: dronework
    domain: drone
    housing_size: 1
    range: intra_planet
    hp: 20
    energy_per_tick: 1.0
    intel_quality: 0.6
    train_seconds: 40
    energy_cost: 4
    cost: { structural: 30, energetic: 30, advanced: 10 }
  - key: recon_drone_mk2
    icon: "🛰"
    name: "Dron de reconocimiento MK2"
    name_en: "Recon drone MK2"
    real: "UAV de reconocimiento medio: más durable y mejor intel, más consumo."
    real_en: "Mid recon UAV: more durable and better intel, higher drain."
    sources: ["Wikipedia: Unmanned aerial vehicle"]
    requires: drone_factory
    requires_tech: drone_endurance
    domain: drone
    housing_size: 2
    range: intra_planet
    hp: 45
    energy_per_tick: 2.0
    intel_quality: 0.8
    train_seconds: 70
    energy_cost: 7
    cost: { structural: 50, energetic: 50, advanced: 25 }
  - key: recon_drone_mk3
    icon: "📡"
    name: "Dron de reconocimiento MK3"
    name_en: "Recon drone MK3"
    real: "UAV de reconocimiento pesado: muy durable e intel casi total, alto consumo."
    real_en: "Heavy recon UAV: very durable and near-total intel, high drain."
    sources: ["Wikipedia: Unmanned aerial vehicle"]
    requires: drone_factory
    requires_tech: drone_endurance
    domain: drone
    housing_size: 3
    range: intra_planet
    hp: 90
    energy_per_tick: 4.0
    intel_quality: 0.95
    train_seconds: 110
    energy_cost: 12
    cost: { structural: 90, energetic: 80, advanced: 50 }
  - key: strike_drone
    icon: "🤖"
    name: "Dron de ataque"
    name_en: "Strike drone"
    real: "UAV de ataque: oleada que castiga una base mientras orbita (drena energía, cae ante torretas)."
    real_en: "Attack UAV: a wave that pounds a base while it orbits (drains energy, falls to turrets)."
    sources: ["Wikipedia: Unmanned combat aerial vehicle"]
    requires: drone_factory
    requires_tech: attack_drones
    domain: drone
    housing_size: 2
    range: intra_planet
    hp: 35
    energy_per_tick: 3.0
    attack: 25
    train_seconds: 90
    energy_cost: 9
    cost: { structural: 70, energetic: 60, advanced: 40 }
