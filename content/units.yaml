# Units catalog. Costs use resource ROLES (resolved per-race), like buildings.
# personnel = population roles; heavy = race-specific war machines.
# requires = building (key) that must be ACTIVE in the base to train this unit.
# i18n: `name`/`description` are ES; `*_en` add English (SDD 4).
personnel:
  - key: worker
    name: "Trabajador"
    name_en: "Worker"
    description: "Aumenta produccion y construccion."
    description_en: "Boosts production and construction."
    requires: headquarters
    energy_cost: 2
    train_seconds: 30
    cost: { structural: 10, energetic: 5 }
    stats: { attack: 0, defense: 1, hp: 5 }
  - key: soldier
    name: "Militar"
    name_en: "Soldier"
    description: "Unidad de combate basica."
    description_en: "Basic combat unit."
    requires: barracks
    energy_cost: 3
    train_seconds: 45
    cost: { structural: 15, energetic: 10 }
    stats: { attack: 8, defense: 5, hp: 12 }
  - key: scientist
    name: "Cientifico"
    name_en: "Scientist"
    description: "Acelera investigacion."
    description_en: "Speeds up research."
    requires: research_lab
    energy_cost: 3
    train_seconds: 45
    cost: { structural: 10, energetic: 15, advanced: 10 }
    stats: { attack: 0, defense: 2, hp: 6 }

heavy:
  - key: tank
    name: "Tanque"
    name_en: "Tank"
    requires: factory
    energy_cost: 8
    train_seconds: 120
    cost: { structural: 80, energetic: 40, advanced: 20 }
    stats: { attack: 30, defense: 25, hp: 60 }
  - key: ship
    name: "Barco"
    name_en: "Ship"
    requires: factory
    # Rigor científico (SDD 13): un barco necesita un océano → solo en planetas con agua líquida.
    requires_liquid_water: true
    propulsion: naval
    energy_cost: 9
    train_seconds: 140
    cost: { structural: 100, energetic: 50 }
    stats: { attack: 25, defense: 30, hp: 80 }
  - key: aircraft
    name: "Avion"
    name_en: "Aircraft"
    requires: factory
    # Rigor científico (SDD 13): un avión necesita atmósfera para volar → no en el vacío.
    requires_atmosphere: true
    propulsion: jet
    energy_cost: 10
    train_seconds: 150
    cost: { structural: 60, energetic: 60, advanced: 40 }
    stats: { attack: 40, defense: 15, hp: 40 }
  - key: shuttle
    name: "Transbordador espacial"
    name_en: "Space shuttle"
    requires: factory
    energy_cost: 15
    train_seconds: 240
    cost: { structural: 120, energetic: 100, advanced: 80 }
    stats: { attack: 20, defense: 20, hp: 100 }
