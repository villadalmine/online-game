# Buildings. Costs are expressed in resource ROLES (resolved per-race) plus
# a flat energy cost and a build time. category=mine buildings produce a mineral.
# i18n: `name`/`description` are ES; `*_en` add English (SDD 4).
buildings:
  - key: headquarters
    icon: "🏛"
    name: "Base central"
    name_en: "Headquarters"
    real: "Centro de mando y control (C2), como un centro de operaciones de misión."
    real_en: "Command & control (C2) center, like a mission operations center."
    sources: ["Wikipedia: Command and control", "NASA: Mission Control Center"]
    category: core
    description: "Centro de mando. Punto de partida de cada jugador."
    description_en: "Command center. Each player's starting point."
    energy_cost: 0
    build_seconds: 0
    storage: 5000          # SDD 47: colchón base de almacenamiento por mineral en el planeta
    houses: { personnel: 20 }   # SDD 46: aloja trabajadores/científicos/espías
    cost:
      structural: 0
  - key: mine
    icon: "⛏"
    name: "Mina"
    name_en: "Mine"
    real: "Minería e ISRU: utilización de recursos in situ para extraer materiales."
    real_en: "Mining and ISRU: in-situ resource utilization to extract materials."
    sources: ["NASA: In-Situ Resource Utilization (ISRU)"]
    category: mine
    description: "Extrae un mineral del planeta. Produccion lazy por timestamp."
    description_en: "Extracts a mineral from the planet. Lazy production by timestamp."
    energy_cost: 10
    build_seconds: 60
    base_output_per_hour: 60   # multiplied by planet abundance for the target mineral
    worker_slots: 5            # SDD 47: trabajadores para operar esta mina al 100% (staffing)
    storage: 2000              # SDD 47: buffer de almacén que aporta para el mineral que extrae
    cost:
      structural: 100
      energetic: 40
  - key: power_plant
    icon: "⚡"
    name: "Planta de energia"
    name_en: "Power plant"
    real: "Central eléctrica (solar, nuclear o fusión) que genera energía."
    real_en: "Power plant (solar, nuclear or fusion) generating energy."
    sources: ["IAEA: Nuclear power", "NASA: Radioisotope Power Systems"]
    category: energy
    description: "Aumenta el tope/regen de energia."
    description_en: "Raises the energy cap/regen."
    energy_cost: 15
    build_seconds: 120
    # SDD 53: energía = rol energetic dominante (acá SÍ pesa el energético; es progreso, no defensa).
    cost:
      structural: 60
      energetic: 140
  - key: market
    icon: "🏪"
    name: "Mercado"
    name_en: "Market"
    real: "Mercado: centro de comercio de recursos."
    real_en: "Market: resource trading hub."
    sources: ["Wikipedia: Marketplace"]
    category: economy
    description: "Permite comprar y vender minerales a precios de este planeta (SDD 42)."
    description_en: "Buy and sell minerals at this planet's prices (SDD 42)."
    energy_cost: 15
    build_seconds: 150
    cost:
      structural: 120
      energetic: 80
      advanced: 20
  - key: hangar
    icon: "🚀"
    name: "Hangar"
    name_en: "Hangar"
    real: "Hangar: cobertizo para estacionar y despachar naves."
    real_en: "Hangar: shed to park and dispatch ships."
    sources: ["Wikipedia: Hangar"]
    category: economy
    requires: factory
    description: "Estaciona naves de carga: cada hangar sube cuántas podés despachar por ventana (SDD 42)."
    description_en: "Parks cargo ships: each hangar raises how many you can dispatch per window (SDD 42)."
    houses: { air: 8, space: 8 }   # SDD 46: aloja aviones y unidades espaciales
    energy_cost: 12
    build_seconds: 130
    cost:
      structural: 90
      energetic: 50
      advanced: 10
  - key: barracks
    icon: "🪖"
    name: "Cuartel"
    name_en: "Barracks"
    real: "Cuartel: alojamiento y entrenamiento de tropas."
    real_en: "Barracks: troop housing and training."
    sources: ["Wikipedia: Barracks"]
    category: military
    description: "Entrena unidades militares."
    description_en: "Trains military units."
    houses: { infantry: 30 }   # SDD 46: aloja la infantería (militares)
    energy_cost: 20
    build_seconds: 180
    # SDD 53: infraestructura de infantería = structural-dominante (defensa no gateada por 1 mineral).
    cost:
      structural: 180
      energetic: 40
      advanced: 20
  - key: factory
    icon: "🏭"
    name: "Taller / Fabrica"
    name_en: "Factory / Workshop"
    real: "Planta de manufactura industrial / ensamblaje."
    real_en: "Industrial manufacturing / assembly plant."
    sources: ["Wikipedia: Factory"]
    category: heavy
    requires: research_lab
    description: "Produce unidades pesadas (tanques, barcos, aviones). Necesita Laboratorio."
    description_en: "Produces heavy units (tanks, ships, aircraft)."
    houses: { ground: 10 }   # SDD 46: aloja unidades pesadas terrestres (tanques)
    energy_cost: 25
    build_seconds: 240
    # SDD 53: industria pesada = structural + advanced dominante.
    cost:
      structural: 210
      energetic: 70
      advanced: 80
  - key: research_lab
    icon: "🔭"
    name: "Laboratorio"
    name_en: "Research lab"
    real: "Laboratorio de investigación y desarrollo (I+D)."
    real_en: "Research and development (R&D) laboratory."
    sources: ["Wikipedia: Research and development"]
    category: science
    description: "Habilita investigacion y cientificos."
    description_en: "Enables research and scientists."
    houses: { personnel: 10 }   # SDD 46: aloja personal civil (científicos, espías, obreros)
    energy_cost: 20
    build_seconds: 200
    # SDD 53: ciencia = rol energetic dominante (el "cuello" del energético es el progreso, no la defensa).
    cost:
      structural: 80
      energetic: 160
      advanced: 80
  - key: turret
    icon: "🛡"
    name: "Torreta defensiva"
    name_en: "Defensive turret"
    real: "Sistema de defensa puntual (CIWS): torreta de armas de fuego rápido."
    real_en: "Close-in weapon system (CIWS): rapid-fire defensive turret."
    sources: ["Wikipedia: Close-in weapon system"]
    category: defense
    requires: research_lab
    requires_tech: weapons
    description: "Defiende la base: suma poder defensivo fijo en combate (sin unidades)."
    description_en: "Defends the base: adds fixed defensive power in combat (no units)."
    energy_cost: 18
    build_seconds: 150
    defense_power: 60   # se suma a la defensa de la base al resolver un ataque (balance: +50% para
                        # que invertir en torretas se note; ~2 torretas ≈ 1 tanque de ataque)
    # SDD 66: mejoras por nivel (data-driven). defense: +defensa/HP; antimissile: +intercepción.
    upgrade:
      defense: { defense_power: 25, hp: 40 }
      antimissile: { intercept_power: 8 }
    hp: 120             # SDD 49: aguante ante misiles (cuánto daño absorbe antes de ser destruida)
    # SDD 49 (balance v1.1): capacidad antimisil por torreta. Ratio vs intercept_cost de cada misil =
    # cuántos frena 1 torreta → sónico 5, transatlántico ~1.6, nuclear 0.33 (hacen falta 3 torretas
    # para 1 nuclear → "casi imposible salvo mucha defensa"). Ver scripts/balance.py.
    intercept_power: 10 # SDD 49: capacidad antimisil (derriba misiles entrantes)
    antiair_power: 30   # SDD 50: fuego antiaéreo por tick contra drones que orbitan
    # SDD 53: defensa = SOLO rol structural → siempre podés levantar torreta con tu mineral base.
    cost:
      structural: 180
  - key: counter_intel
    icon: "🛰"
    name: "Contrainteligencia"
    name_en: "Counter-intelligence"
    category: defense
    requires: research_lab
    requires_tech: counter_espionage
    description: "Protege tu base del espionaje enemigo: reduce la info que obtienen."
    description_en: "Shields your base from enemy espionage: reduces the intel they get."
    real: "Contraespionaje / OPSEC."
    real_en: "Counter-espionage / OPSEC."
    sources: ["Wikipedia: Counterintelligence"]
    energy_cost: 12
    build_seconds: 90
    counter_power: 60   # se suma a la defensa de espionaje de la base
    # SDD 53: defensa (anti-espionaje) = structural + advanced (sin energetic) → siempre defendible.
    cost:
      structural: 140
      advanced: 80
  - key: silo
    icon: "🛢"
    name: "Silo"
    name_en: "Silo"
    real: "Silo de almacenamiento: depósito a granel de un material."
    real_en: "Storage silo: bulk depot for a single material."
    sources: ["Wikipedia: Silo"]
    category: storage
    description: "Almacena UN solo mineral (se elige al construir). Sube el tope de ese material (SDD 47)."
    description_en: "Stores a SINGLE mineral (chosen at build time). Raises that material's cap (SDD 47)."
    energy_cost: 12
    build_seconds: 120
    storage_capacity: 10000   # SDD 47: capacidad que aporta al mineral asignado (production_mineral)
    cost:
      structural: 120
      energetic: 40
  - key: port
    icon: "⚓"
    name: "Puerto"
    name_en: "Port"
    real: "Puerto naval: amarre y mantenimiento de buques."
    real_en: "Naval port: berthing and maintenance of vessels."
    sources: ["Wikipedia: Port"]
    category: heavy
    description: "Aloja unidades navales (barcos). Sin puerto no podés guardar barcos (SDD 46)."
    description_en: "Houses naval units (ships). Without a port you can't keep ships (SDD 46)."
    houses: { naval: 8 }   # SDD 46: aloja barcos
    energy_cost: 14
    build_seconds: 150
    cost:
      structural: 110
      energetic: 50
  - key: launcher
    icon: "🗼"
    name: "Lanzadera de misiles"
    name_en: "Missile launcher"
    real: "Silo de lanzamiento de misiles: estructura fija que almacena y dispara misiles."
    real_en: "Missile launch silo: fixed structure that stores and fires missiles."
    sources: ["Wikipedia: Missile launch facility"]
    category: strike
    requires: research_lab
    requires_tech: rocketry
    description: "Fabrica y dispara misiles a bases enemigas del MISMO planeta (SDD 49). Aloja misiles."
    description_en: "Builds and fires missiles at enemy bases on the SAME planet (SDD 49). Houses missiles."
    houses: { ordnance: 6 }   # SDD 46/49: aloja misiles (dominio ordnance)
    launch_energy: 30         # SDD 49: energía por salva (además del costo del misil)
    range: intra_planet       # SDD 49: el objetivo debe estar en el mismo planeta
    energy_cost: 25
    build_seconds: 220
    cost:
      structural: 220
      energetic: 120
      advanced: 80
  - key: drone_factory
    icon: "🛸"
    name: "Fábrica de drones"
    name_en: "Drone factory"
    real: "Planta de ensamblaje de vehículos aéreos no tripulados (UAV)."
    real_en: "Assembly plant for unmanned aerial vehicles (UAV)."
    sources: ["Wikipedia: Unmanned aerial vehicle"]
    category: drones
    requires: research_lab
    requires_tech: dronework
    description: "Fabrica drones intra-planeta (espía en vivo y ataque). Aloja drones (SDD 50)."
    description_en: "Builds intra-planet drones (live spy and attack). Houses drones (SDD 50)."
    houses: { drone: 12 }   # SDD 46/50: aloja drones (dominio drone)
    energy_cost: 22
    build_seconds: 200
    cost:
      structural: 200
      energetic: 140
      advanced: 90
  # SDD 61: cosmódromo (lanza satélites) + inhibidor de señal (protege del mapeo).
  - key: cosmodrome
    icon: 🛰
    name: "Cosmódromo"
    name_en: "Cosmodrome"
    real: "Base de lanzamiento orbital: cohetes que ponen satélites en órbita."
    real_en: "Orbital launch site: rockets that put satellites in orbit."
    sources: ["Wikipedia: Spaceport"]
    category: orbital
    requires: research_lab
    requires_tech: satellite_tech
    description: "Lanza y aloja satélites (recon propio + espía que mapea al enemigo, SDD 61)."
    description_en: "Launches and houses satellites (own recon + enemy-mapping spies, SDD 61)."
    houses: { satellite: 6 }   # SDD 46/61: aloja satélites (dominio satellite)
    energy_cost: 30
    build_seconds: 260
    cost:
      structural: 260
      energetic: 220
      advanced: 180
  # SDD 67: política/diplomacia — el gobierno habilita investigar diplomacia (y futuros tratados).
  - key: government
    icon: 🏛
    name: "Edificio de gobierno"
    name_en: "Government building"
    real: "Sede de gobierno: política exterior, tratados y diplomacia."
    real_en: "Seat of government: foreign policy, treaties and diplomacy."
    sources: ["Wikipedia: Government"]
    category: politics
    requires: research_lab
    description: "Sede política del imperio: habilita investigar Diplomacia (tributos, tratados)."
    description_en: "Political seat of the empire: unlocks researching Diplomacy (tributes, treaties)."
    energy_cost: 25
    build_seconds: 240
    cost:
      structural: 220
      energetic: 120
      advanced: 60
  - key: signal_inhibitor
    icon: 📡
    name: "Inhibidor de señal"
    name_en: "Signal inhibitor"
    real: "Guerra electrónica: jamming que estorba el reconocimiento satelital."
    real_en: "Electronic warfare: jamming that hinders satellite reconnaissance."
    sources: ["Wikipedia: Radar jamming and deception"]
    category: defense
    requires: research_lab
    requires_tech: advanced_signals
    description: "Protege tus bases del mapeo satelital. Más edificios tenés, más inhibidores necesitás."
    description_en: "Shields your bases from satellite mapping. The more you build, the more you need."
    energy_cost: 16
    build_seconds: 140
    inhibit_power: 8   # SDD 61: jamming; cobertura = min(1, Σinhibit / nº de edificios)
    cost:
      structural: 180
      advanced: 100
