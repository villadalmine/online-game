# Races. The KEY mechanic: recipes ask for abstract resource ROLES
# (structural / energetic / advanced); each race maps a role -> a concrete mineral.
# Change which mineral a race uses by editing ONE value in resource_roles.
# i18n: `name`/`description` are ES; `*_en` add English (SDD 4). `personality`/`taunts`
# drive NPC behavior (model-facing, not UI) so they stay in their authored language.
races:
  - key: terran
    name: "Terricolas"
    name_en: "Terrans"
    home_planet: earth
    # Tolerancias para colonizar otros planetas (SDD 37): ambiente ideal + cuánto se bancan apartarse.
    tolerances:
      ideal_gravity_g: 1.0
      ideal_temp_c: 15
      gravity_tol: 0.55
      temp_tol: 60
      atmospheres: [thin, thick]
      needs_water: false
      hostile_penalty: 0.55
    description: "Equilibrados y versatiles. Economia y diplomacia fuertes."
    description_en: "Balanced and versatile. Strong economy and diplomacy."
    personality: >-
      Eres una raza terricola pragmatica y diplomatica. Priorizas una economia
      solida: minas y trabajadores primero, expansion sostenida, y solo atacas
      cuando tienes ventaja clara. Juegas a largo plazo.
    resource_roles:
      structural: iron
      energetic: silicon
      advanced: aluminum
    bonuses:
      worker_train_speed: 1.25
      economy: 1.2
    # perk de unidad: se comparte entre aliados con shared_unit_tech
    unit_perk:
      production: 1.10
    # frases in-character que las NPC mandan al humano que atacan (data-driven)
    taunts:
      attack:
        - "La diplomacia fallo; ahora hablan nuestras flotas."
        - "Esto es estrictamente negocios."
      win:
        - "Un pesimo negocio para ti."
        - "La logistica siempre gana."
      lose:
        - "Tomamos nota. La cuenta sigue abierta."
        - "Retirada tactica, no derrota."
  - key: martian
    name: "Marcianos"
    name_en: "Martians"
    home_planet: mars
    # Marcianos: rudos, resisten frío y baja gravedad (toleran más ambientes hostiles).
    tolerances:
      ideal_gravity_g: 0.38
      ideal_temp_c: -50
      gravity_tol: 0.7
      temp_tol: 150
      atmospheres: [thin, thick]
      needs_water: false
      hostile_penalty: 0.7
    description: "Rudos y militaristas; resisten ambientes hostiles."
    description_en: "Rugged and militaristic; they endure hostile environments."
    personality: >-
      Eres una raza marciana belicosa y agresiva. Construyes lo minimo para
      sostener un ejercito y buscas atacar pronto y seguido. La guerra es tu
      forma de crecer: prefieres saquear al enemigo antes que minar pacientemente.
    resource_roles:
      structural: iron
      energetic: sulfur
      advanced: magnesium
    bonuses:
      military_attack: 1.25
      heavy_unit_cost: 0.9
    unit_perk:
      attack: 1.10
    taunts:
      attack:
        - "Tu base ardera bajo dos soles!"
        - "Marte no pide permiso!"
      win:
        - "Polvo rojo sobre tus ruinas!"
        - "Debil, como esperabamos!"
      lose:
        - "Volveremos con el doble!"
        - "Una batalla, no la guerra."
  - key: venusian
    name: "Venusianos"
    name_en: "Venusians"
    home_planet: venus
    # Venusianos: alta tecnología, resisten calor extremo y atmósferas densas.
    tolerances:
      ideal_gravity_g: 0.9
      ideal_temp_c: 400
      gravity_tol: 0.6
      temp_tol: 420
      atmospheres: [thin, thick]
      needs_water: false
      hostile_penalty: 0.7
    description: "Alta tecnologia, resistentes al calor; energia y ciencia."
    description_en: "High technology, heat-resistant; energy and science."
    personality: >-
      Eres una raza venusiana tecnologica y cautelosa. Inviertes en ciencia,
      energia y defensa; preparas tu base y unidades avanzadas antes de pelear.
      Exploras lunas por recursos premium y atacas solo con superioridad tecnica.
    resource_roles:
      structural: basalt
      energetic: sulfur
      advanced: titanium
    bonuses:
      research_speed: 1.3
      defense: 1.2
    unit_perk:
      defense: 1.10
    taunts:
      attack:
        - "Calculamos tu derrota con tres decimales."
        - "Superioridad tecnica en aproximacion."
      win:
        - "Resultado dentro del margen previsto."
        - "La ciencia no improvisa."
      lose:
        - "Anomalia registrada. Recalibrando."
        - "Un error de calculo; no se repetira."
