name: GitHub Pages (auto desde SDDs)

# Genera el sitio (scripts/build_site.py) desde los SDDs + CHANGELOG y lo publica en Pages.
# Habilitar una vez: Settings → Pages → Source = GitHub Actions. URL del juego: Settings →
# Secrets and variables → Actions → Variables → GAME_URL (opcional; no se hardcodea en el repo).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generar el sitio
        env:
          GAME_URL: ${{ vars.GAME_URL }}
        run: python scripts/build_site.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
